<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>DEV SSC Demo Q11-Q15</title>
<style>
body{font-family:Arial,sans-serif;background:#eef3f8;margin:0}
header{background:#0b57d0;color:#fff;padding:14px;text-align:center;font-size:24px;font-weight:bold}
.card{max-width:820px;margin:18px auto;background:#fff;padding:20px;border-radius:12px}
.option{display:block;width:100%;margin:10px 0;padding:12px;border:2px solid #bbb;border-radius:10px;background:#fff;text-align:left;font-size:17px}
.correct{background:#d4edda;border-color:#28a745}
.wrong{background:#f8d7da;border-color:#dc3545}
#exp{display:none;background:#eef7ff;padding:12px;border-left:4px solid #0b57d0;white-space:pre-line;margin-top:10px}
button{padding:10px 15px;margin:5px}
</style>
</head>
<body>
<header>DEV SSC ACADEMY - Demo Quiz (Q11-Q15)</header>
<div class="card">
<div id="info"></div>
<h2 id="question"></h2>
<div id="options"></div>
<div id="exp"></div>
<div>
<button onclick="back()">⬅ Back</button>
<button onclick="nextQ()">➡️ Next</button>
<button onclick="submitQuiz()">✅ Submit Test</button>
</div>
</div>

<script>
const quiz=[
{q:"आठवीं अनुसूची में मूल रूप से कितनी भाषाएं थीं?",o:["12","14","18","22"],a:1,e:"✅ सही उत्तर: 14 भाषाएँ\nमूल संविधान (1950) में 8वीं अनुसूची में 14 भाषाएँ थीं। वर्तमान में 22 भाषाएँ हैं।"},
{q:"वर्तमान में आठवीं अनुसूची में कितनी भाषाएं शामिल हैं?",o:["20","21","22","24"],a:2,e:"✅ सही उत्तर: 22 भाषाएँ\nसमय-समय पर संशोधनों द्वारा भाषाएँ जोड़ी गईं।"},
{q:"21वें संविधान संशोधन (1967) द्वारा कौन सी भाषा जोड़ी गई थी?",o:["सिंधी","नेपाली","कोंकणी","बोडो"],a:0,e:"✅ सही उत्तर: सिंधी\n21वें संविधान संशोधन, 1967 द्वारा सिंधी भाषा जोड़ी गई।"},
{q:"71वें संविधान संशोधन (1992) द्वारा किन तीन भाषाओं को जोड़ा गया था?",o:["बोडो, डोगरी, मैथिली","कोंकणी, मणिपुरी और नेपाली","मराठी, पालि, प्राकृत","तमिल, तेलुगू और कन्नड़"],a:1,e:"✅ सही उत्तर: कोंकणी, मणिपुरी और नेपाली\nबोडो, डोगरी, मैथिली व संथाली 92वें संशोधन से जुड़ी थीं।"},
{q:"92वें संविधान संशोधन (2003) द्वारा जोड़ी गई चार भाषाएं कौन सी हैं?",o:["बोडो, डोगरी, मैथिली और संथाली","सिंधी","कोंकणी, नेपाली","मराठी, बंगाली"],a:0,e:"✅ सही उत्तर: बोडो, डोगरी, मैथिली और संथाली\nयह संशोधन 2003 में पारित हुआ।"}
];
let idx=0,score=0,done=[false,false,false,false,false],attempt=[false,false,false,false,false];
function render(){
info.innerHTML="<b>Question "+(idx+11)+" / 15</b> | Score: "+score;
question.innerText="Q"+(idx+11)+". "+quiz[idx].q;
options.innerHTML="";
exp.style.display="none";
quiz[idx].o.forEach((t,i)=>{
let b=document.createElement("button");
b.className="option";
b.textContent=t;
b.onclick=()=>pick(i,b);
options.appendChild(b);
});
}
function pick(i,b){
if(done[idx])return;
done[idx]=true;attempt[idx]=true;
document.querySelectorAll(".option").forEach((x,j)=>{x.disabled=true;if(j===quiz[idx].a)x.classList.add("correct");});
if(i===quiz[idx].a)score++; else b.classList.add("wrong");
exp.innerText=quiz[idx].e;
exp.style.display="block";
}
function nextQ(){if(idx<4){idx++;render();}else submitQuiz();}
function back(){if(idx>0){idx--;render();}}
function submitQuiz(){
let att=attempt.filter(x=>x).length;
let wrong=att-score;
let un=5-att;
if(!confirm("Attempted: "+att+"/5\nUnattempted: "+un+"\n\nSubmit Test?"))return;
document.body.innerHTML="<div class='card'><h1>🏆 Quiz Result</h1><h2>DEV SSC ACADEMY</h2><p><b>Correct:</b> "+score+"</p><p><b>Wrong:</b> "+wrong+"</p><p><b>Unattempted:</b> "+un+"</p><p><b>Accuracy:</b> "+(att?Math.round(score*100/att):0)+"%</p><button onclick='location.reload()'>🔄 Restart Quiz</button></div>";
}
render();
</script>
</body>
</html>
