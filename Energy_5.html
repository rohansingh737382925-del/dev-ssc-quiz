<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DREAM TO DESTINY - PYQ़</title>
<style>
body { font-family: sans-serif; background-color: #f4f7f6; margin: 0; padding: 10px; display: flex; justify-content: center; }
.container { width: 100%; max-width: 500px; background: #fff; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
h2 { text-align: center; color: #d32f2f; font-size: 1.2rem; margin-bottom: 15px; }
.question { font-weight: bold; margin-bottom: 15px; font-size: 1.05rem; line-height: 1.4; color: #333; }
.options button { display: block; width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 8px; background: #fff; cursor: pointer; text-align: left; font-size: 0.95rem; }
.options button:disabled{
    opacity: 1;
    color: #222;
    -webkit-text-fill-color: #222;
}
#feedback { margin-top: 15px; padding: 12px; background: #e3f2fd; border-left: 5px solid #1976d2; display: none; font-size: 0.9rem; line-height: 1.4; color: #444; }
.controls { display: flex; justify-content: space-between; margin-top: 20px; }
.nav-btn { padding: 10px 15px; border: none; border-radius: 5px; background: #1976d2; color: white; font-weight: bold; cursor: pointer; }
#submit-btn { background: #388e3c; width: 100%; margin-top: 10px; }


#streakPopup{
position:fixed;
inset:0;
display:none;
align-items:flex-start;
justify-content:center;
background:transparent;
pointer-events:none;
z-index:99999;
overflow:hidden;
}
#streakPopup.show{
display:flex;
}
#streakCard{
background:linear-gradient(135deg,#ffd54f,#fff8e1);
padding:16px 22px;
border-radius:18px;
text-align:center;
box-shadow:0 0 24px rgba(255,193,7,.55);
font-weight:bold;
max-width:320px;
width:72%;
margin-top:40px;
transform:none;
transition:none;
}
#streakPopup.show #streakCard{
background:linear-gradient(135deg,#ffd54f,#fff8e1);
padding:16px 22px;
border-radius:18px;
text-align:center;
box-shadow:0 0 24px rgba(255,193,7,.55);
transform:scale(.5);
transition:.3s;
font-weight:bold;
max-width:320px;
width:72%;
margin-top:40px;
}
.burst{
position:fixed;width:10px;height:10px;border-radius:50%;
background:#FFD700;box-shadow:0 0 10px #FFD700;pointer-events:none;animation:burst .8s ease-out forwards;
}
@keyframes burst{
to{transform:translate(var(--x),var(--y)) scale(0);opacity:0;}
}

</style>
</head>
<body>
<div id='streakPopup'><div id='streakCard'><div id='streakTitle' style='font-size:24px'></div><div id='streakSub' style='margin-top:40px;font-size:15px'>Keep Going!</div></div></div>
<div class="container" style="position:relative;">
<h2>DREAM TO DESTINY</h2>
<div id="qBadge" style="position:absolute;top:18px;right:18px;background:#fff;border:1px solid #1976d2;border-radius:16px;padding:3px 9px;font:600 12px sans-serif;color:#1976d2;">Q 1/1</div>
<div id="jumpBox" style="display:flex;gap:8px;margin:10px 0 15px;">
<input id="jumpNo" type="number" placeholder="Question No"
style="flex:1;padding:8px;border:1px solid #ccc;border-radius:6px;">
<button class="nav-btn" onclick="goToQuestion(document.getElementById('jumpNo').value)">Go</button>
</div>
<div id="quiz-box">
<div id="q-text" class="question"></div>
<div id="exam-tag" style="color:#d32f2f;font-weight:bold;margin:-5px 0 12px 0;"></div>
<div id="options" class="options"></div>
<div id="feedback"></div>
</div>
<div id="controls">
<div class="controls">
<button class="nav-btn" onclick="prevQ()">⬅ पिछला</button>
<button class="nav-btn" style="background:#388e3c;" onclick="confirmSubmit()">✅ Submit Test</button>
<button class="nav-btn" onclick="nextQ()">अगला ➡</button>
</div>
</div>

<div id="score-card" style="display:none;padding:20px;">
<div style="text-align:center;background:linear-gradient(145deg,#fff8dc 0%,#ffffff 45%,#f7f2d3 100%);border:1px solid #f1d46a;border-radius:18px;padding:20px;box-shadow:0 6px 16px rgba(0,0,0,.12);">
<div style="font-size:42px;">🏆</div>
<h2 style="margin:5px 0;color:#d32f2f;">TEST RESULT</h2>
<div style="font-size:38px;font-weight:bold;"><span id="score"></span>/<span id="total"></span></div>
<div id="perfBadge" style="display:inline-block;margin:10px auto;padding:8px 16px;border-radius:20px;background:#2e7d32;color:#fff;font-weight:bold;">EXCELLENT</div>

<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:40px;">
<div style="background:#e8f5e9;padding:12px;border-radius:12px;">✔<br><b id="correct"></b><br>Correct</div>
<div style="background:#ffebee;padding:12px;border-radius:12px;">❌<br><b id="wrong"></b><br>Wrong</div>
<div style="background:#e3f2fd;padding:12px;border-radius:12px;">📝<br><b id="attempted"></b><br>Attempted</div>
<div style="background:#fff8e1;padding:12px;border-radius:12px;">📋<br><b id="unattempted"></b><br>Unattempted</div>
<div style="background:#f3e5f5;padding:12px;border-radius:12px;">🎯<br><b><span id="accuracy"></span>%</b><br>Accuracy</div>
<div style="background:#ede7f6;padding:12px;border-radius:12px;">🔥<br><b id="highestStreak"></b><br>Streak</div>
</div>


<div style="margin:18px auto 18px;max-width:220px;background:#e3f2fd;
border:1px solid #90caf9;border-radius:14px;padding:10px 14px;text-align:center;
box-shadow:0 2px 8px rgba(25,118,210,.12);">
<div style="font-size:12px;font-weight:700;color:#1976d2;letter-spacing:.5px;">⏱️ TIME TAKEN</div>
<div style="font-size:28px;font-weight:800;color:#222;margin-top:4px;">
<span id="timeTaken"></span>
</div>
</div>

<button class="nav-btn" style="background:#d32f2f;" onclick="location.reload()">दोबारा शुरू करें</button>
</div>
</div>
</div>
<script>

const data = [
  {q:"384. कार्य करने में सक्षम वस्तु में - होता है।", tag:"RRB Group-D 15-11-2018 (Shift-III)", o:["बल", "ऊर्जा", "संवेग", "शक्ति"], a:1, e:"कार्य करने में सक्षम वस्तु में ऊर्जा होती है। किसी भी कार्यकर्ता के कार्य करने की क्षमता को ऊर्जा कहते हैं। ऊर्जा के विभिन्न रूप होते हैं। इसे एक रूप से दूसरे रूप में परिवर्तित किया जा सकता है। तने हुए स्प्रिंग में जो ऊर्जा होती है उसे स्थितिज ऊर्जा कहते है। बहते पानी की ऊर्जा गतिज ऊर्जा है। बारूद की ऊर्जा रासायनिक ऊर्जा है।"},
  {q:"385. एक हाइड्रोइलेक्ट्रिक पावर स्टेशन पर बहने वाला पानी टरबाइन घुमा सकता है क्योंकि इसमें निहित है-", tag:"RRB Group-D 02-11-2018 (Shift-II)", o:["विद्युत ऊर्जा", "रासायनिक ऊर्जा", "गतिज ऊर्जा", "स्थितिज ऊर्जा"], a:2, e:"गतिज ऊर्जा किसी पिण्ड की वह अतिरिक्त ऊर्जा है जो उसके रेखीय वेग अथवा कोणीय वेग अथवा दोनों के कारण होती है। इसका मान उस पिण्ड को विरामावस्था से उस वेग तक त्वरित करने में किये गये कार्य के बराबर होती है। KE = 1/2 mv^2"},
  {q:"386. निम्न में से कौन सा कथन गलत है?", tag:"RRB Group-D 01-12-2018 (Shift-II)", o:["संपीडित स्प्रिंग में स्थितिज ऊर्जा होती है।", "उठाए गए हथौड़े में स्थितिज ऊर्जा होती है।", "बांध के जल में गतिज ऊर्जा होती है।", "गतिशील कार में गतिज ऊर्जा होती है。"], a:2, e:"बाँध के जल में स्थितिज ऊर्जा होती है। किसी वस्तु में उसकी किसी विशेष स्थिति या अवस्था के कारण जो कार्य करने की क्षमता आ जाती है, उसे स्थितिज ऊर्जा कहते है। जैसे घड़ी की चाभी में संचित ऊर्जा, तनी हुयी स्प्रिंग या कमानी की ऊर्जा।"},
  {q:"387. एक वस्तु का द्रव्यमान 20 kg है और वह 6 m/Sec की चाल से गतिमान है। वस्तु की गतिज ऊर्जा कितनी है?", tag:"RRB Group-D 05-12-2018 (Shift-III)", o:["3600 J", "360 J", "36 J", "3.6 J"], a:1, e:"किसी वस्तु में गति के कारण उत्पन्न ऊर्जा को उस वस्तु की गतिज ऊर्जा कहते हैं। यदि m द्रव्यमान की वस्तु v वेग से चल रही है तब गतिज ऊर्जा (K.E) = 1/2 mv^2। दिया है- द्रव्यमान (m) = 20 kg, वेग (v) = 6 m/s। K.E = 1/2 * 20 * (6)^2 = 1/2 * 20 * 36 = 10 * 36 = 360 J"},
  {q:"388. दिए गए चित्र से ऊर्जा के संबंध में क्या अनुमान लगाया जा सकता है?", img:"https://rohansingh737382925-del.github.io/dev-ssc-quiz/images/20260707_182309.jpg", tag:"RRB Group-D 05-11-2018 (Shift-I)", o:["दोनों वाहनों में गुरुत्वीय स्थितिज ऊर्जा है", "उच्च ऊर्जा का उपयोग कर दो वाहन तेजी से आगे बढ़ रहे हैं।", "दोनों वाहन यांत्रिक ऊर्जा को पेशीय ऊर्जा में परिवर्तित कर रहे हैं।", "दोनों वाहनों में गतिज ऊर्जा है।"], a:3, e:"दिए गए चित्रानुसार दोनों वाहन गति की अवस्था में है इसलिए इन दोनों वाहनों में गतिज ऊर्जा होगी। इस प्रकार वस्तु की गति के कारण कार्य करने की क्षमता गतिज ऊर्जा कहलाती हैं। यदि m द्रव्यमान की वस्तु v मी/से. की चाल से चल रही है तो गतिज ऊर्जा (KE) = 1/2 mv^2। गतिज ऊर्जा सदैव धनात्मक होती है।"},
  {q:"389. किसी निश्चित ऊँचाई पर उठे हुए पानी में - ऊर्जा होती है।", tag:"RRB Group-D 15-11-2018 (Shift-II)", o:["गतिज", "स्थितिज", "विद्युतीय", "रासायनिक"], a:1, e:"किसी निश्चित ऊंचाई पर उठे हुए पानी में स्थितिज ऊर्जा होती है। स्थितिज ऊर्जा में यदि कोई वस्तु पृथ्वी से ऊँचाई पर होती है तो ऊपर उठाने में पृथ्वी का गुरुत्व बल आरोपित होता है, अर्थात किसी वस्तु को पृथ्वी से ऊपर उठाने में पृथ्वी के गुरुत्व बल के विरूद्ध कार्य करना पड़ता है, ऊँचाई पर स्थित होने पर इस सम्पादित कार्य के तुल्य वस्तु में स्थितिज ऊर्जा संचित हो जाती है।"},
  {q:"390. यदि कोई लड़का गैस से भरा गुब्बारा छोड़ता है, जो ऊपर जाता है, तो स्थितिज ऊर्जा होगी :", tag:"RRB Group-D 07-12-2018 (Shift-I)", o:["घटती है", "स्थिर रहती है", "अनंत रहती है", "बढ़ती है"], a:3, e:"किसी वस्तु में स्थितिज ऊर्जा ऊँचाई बढ़ने के साथ-साथ बढ़ती है। जब कोई लड़का गैस से भरा गुब्बारा छोड़ता है तो h का मान बढ़ता है जिससे स्थितिज ऊर्जा बढ़ती जाती है। स्थितिज ऊर्जा = द्रव्यमान * गुरुत्वीय त्वरण * ऊँचाई"},
  {q:"391. यदि साइकिल की गति दोगुनी हो जाए, तो गतिज ऊर्जा, - हो जाती है।", tag:"RRB Group-D 22-09-2018 (Shift-III)", o:["16 गुना", "8 गुना", "4 गुना", "2 गुना"], a:2, e:"गतिज ऊर्जा (Ek) = 1/2 mv^2। Ek v^2। (Ek2 / Ek1) = (V2^2 / V1^2) = (2V1^2 / V1^2) = 4। Ek2 = 4Ek1। अतः साइकिल की गति दोगुनी होने पर उसकी गतिज ऊर्जा 4 गुना हो जाती है।"},
  {q:"392. 30 किलो द्रव्यमान की एक वस्तु को 10 ms^-1 एक समान वेग से स्थानांतरित किया जा रहा है। वस्तु की गतिशील ऊर्जा है।", tag:"RRB Group-D 26-09-2018 (Shift-III)", o:["-150 J", "1500 J", "-1500 J", "150 J"], a:1, e:"गतिशील ऊर्जा = 1/2 mv^2 = 1/2 * 30 * 10 * 10 = 1500 J"},
  {q:"393. 30 किग्रा द्रव्यमान की एक वस्तु 5 मी/से. के एक समान वेग से घूम रही है। वस्तु के अधीन गतिज ऊर्जा क्या है?", tag:"RRB Group-D 25-09-2018 (Shift-I)", o:["375 न्यूटन", "375 जूल", "375 किग्रा मी./से.", "375 पास्कल"], a:1, e:"द्रव्यमान = 30 किग्रा, चाल = 5 मी/से.। K.E. = 1/2 mv^2 = 1/2 * 30 * 5 * 5 = 15 * 5 * 5 = 375 जूल"},
  {q:"394. एक वस्तु में 20 kg द्रव्यमान और 10 N/kg के गुरुत्वाकर्षण के साथ 400 J की स्थितिज ऊर्जा होती है। वस्तु की ऊँचाई है-", tag:"RRB Group-D 28-09-2018 (Shift-I)", o:["0.5m", "4m", "Im", "2m"], a:3, e:"वस्तु का द्रव्यमान (m) = 20 kg, उसकी गुरुत्वाकर्षण (g) = 10 N kg^-1, वस्तु की स्थितिज ऊर्जा (E) = 400 J, उसकी ऊँचाई (h) = ?। Ep = mgh => 400 = 20 * 10 * h => 400 = 200 * h => h = 400/200 = 2 m"},
  {q:"395. 15 kg के हथौड़े को जब 10 m की ऊंचाई तक उठाया जाता है, तो इसके द्वारा प्राप्त स्थितिज ऊर्जा ज्ञात कीजिए ?", tag:"RRB Group-D 05-10-2018 (Shift-I)", o:["1500 J", "-150 J", "-1500 J", "150 J"], a:0, e:"स्थितिज ऊर्जा वस्तु को ऊपर उठाने में किया गया कार्य। P.E. = mgh, जहाँ m = 15 kg, g = 10 m/s^2, h = 10m। P.E. = 15 * 10 * 10 = 1500J"},
  {q:"396. 30 ms^-1 की गति से चलने वाले 2 kg द्रव्यमान के बॉल की गतिज ऊर्जा ज्ञात करें-", tag:"RRB Group-D 04-10-2018 (Shift-II)", o:["900 N", "900 J", "900 W", "900 Pa"], a:1, e:"द्रव्यमान (m) = 2 kg, वेग (v) = 30 मी/सेकण्ड। गतिज ऊर्जा (K.E.) = 1/2 mv^2 = 1/2 * 2 * 30 * 30 = 900 J"},
  {q:"397. यदि एक वस्तु का वेग इसके शुरुआती वेग से दोगुना हो जाता है, तो इसकी गतिज ऊर्जा में कितने गुना वृद्धि हो जाएगी?", tag:"RRB Group-D 24-09-2018 (Shift-II)", o:["4", "5", "3", "2"], a:0, e:"किसी वस्तु का द्रव्यमान m किग्रा. तथा वेग = v मी./से.। वस्तु की गतिज ऊर्जा (KE1) = 1/2 mv^2 ....... (i) तथा गति दोगुनी करने पर (KE2) = 1/2 m(2v)^2 = 1/2 mv^2 * 4 (ii)। समी. (i) और (ii) की तुलना करने पर KE1/KE2 = 1/4। KE2 = 4KE1। अतः गति दोगुनी करने पर गतिज ऊर्जा में चार गुना की वृद्धि होगी।"},
  {q:"398. किसी वस्तु का द्रव्यमान m=30 kg तथा वस्तु का वेग v=5 ms^-1 है। वस्तु की गतिज ऊर्जा ज्ञात करें-", tag:"RRB Group-D 11-10-2018 (Shift-III)", o:["375 N", "375 W", "375 Pa", "375 J"], a:3, e:"गतिज ऊर्जा => KE = 1/2 mv^2 जहाँ m = 30 kg, v = 5 ms^-1, KE = 1/2 * 30 * 5 * 5 = 75 * 5 = 375 J"},
  {q:"399. 12 kg द्रव्यमान की कोई वस्तु एक नियत ऊँचाई पर स्थित है। वस्तु की स्थितिज ऊर्जा 600 J है। वस्तु की भूतल से ऊँचाई कितनी है? g=10 ms^-2 दिया गया है。", tag:"RRB Group-D 22-10-2018 (Shift-I)", o:["-5 m", "5 ms^-2", "5 m", "5 ms^2"], a:2, e:"वस्तु का द्रव्यमान = 12 kg, वस्तु की स्थितिज ऊर्जा = 600 J, भूतल से ऊंचाई = ? सूत्र- स्थितिज ऊर्जा (P.E) = mgh => 600 = 12 * 10 * h => 50 = 10 * h => h = 5 m, वस्तु की भूतल से ऊँचाई = 5 m"},
  {q:"400. निम्नलिखित में से कौन सी ऊर्जा गति के साथ बढ़ती है?", tag:"RRB Group-D 24-10-2018 (Shift-I)", o:["रासायनिक ऊर्जा", "स्थितिज ऊर्जा", "गतिज ऊर्जा", "विद्युत ऊर्जा"], a:2, e:"गतिज ऊर्जा, गति के साथ बढ़ती है। गतिज ऊर्जा किसी पिण्ड की वह अतिरिक्त ऊर्जा है जो रेखीय तथा कोणीय वेग दोनों के कारण होती है। इसका सूत्र, (KE) = 1/2 mv^2 होता है। जहाँ m = द्रव्यमान, v = का वेग"},

function formatContent(txt){
 if(txt==null) return "";
 txt=String(txt);
 txt=txt.replace(/\\n/g,"<br>");
 while(/\\text\{([^{}]*)\}/.test(txt)){ txt=txt.replace(/\\text\{([^{}]*)\}/g,"$1"); }
 txt=txt.replace(/\^\{([^}]+)\}/g,"<sup>$1</sup>");
 txt=txt.replace(/_\{([^}]+)\}/g,"<sub>$1</sub>");
 txt=txt.replace(/([A-Za-z0-9\)\]])\^(-?\d+)/g,"$1<sup>$2</sup>");
 txt=txt.replace(/([A-Za-z])_([A-Za-z0-9]+)/g,"$1<sub>$2</sub>");
 txt=txt.replace(/\\frac\{([^{}]+)\}\{([^{}]+)\}/g,'<span style="display:inline-block;vertical-align:middle;text-align:center;"><span style="display:block;border-bottom:1px solid #000;padding:0 2px;">$1</span><span style="display:block;">$2</span></span>');
 txt=txt.replace(/\\sqrt\{([^{}]+)\}/g,"√($1)");
 txt=txt.replace(/\^\\circ/g,"°").replace(/\\circ/g,"°").replace(/\\Omega/g,"Ω").replace(/\\lambda/g,"λ").replace(/\\alpha/g,"α").replace(/\\beta/g,"β").replace(/\\gamma/g,"γ").replace(/\\times/g,"×").replace(/\\cdot/g,"·").replace(/\\div/g,"÷").replace(/\\pm/g,"±").replace(/\\approx/g,"≈").replace(/\\neq/g,"≠").replace(/\\geq?/g,"≥").replace(/\\leq?/g,"≤").replace(/\\Rightarrow/g,"⇒").replace(/\\rightarrow/g,"→").replace(/\\leftarrow/g,"←").replace(/\\%/g,"%");

 txt=txt.replace(/\\sin\b/g,"sin");
 txt=txt.replace(/\\cos\b/g,"cos");
 txt=txt.replace(/\\tan\b/g,"tan");
 txt=txt.replace(/\\cot\b/g,"cot");
 txt=txt.replace(/\\sec\b/g,"sec");
 txt=txt.replace(/\\csc\b/g,"csc");
 txt=txt.replace(/\\pi\b/g,"π");
 txt=txt.replace(/\\theta\b/g,"θ");
 txt=txt.replace(/\\rho\b/g,"ρ");
 txt=txt.replace(/\\phi\b/g,"φ");
 txt=txt.replace(/\\mu\b/g,"μ");
 txt=txt.replace(/\\sigma\b/g,"σ");
 txt=txt.replace(/\\omega\b/g,"ω");
 txt=txt.replace(/\\Delta\b/g,"Δ");
 txt=txt.replace(/\\propto\b/g,"∝");
 txt=txt.replace(/MATH_BLOCK_[0-9_]+/g,"");
 txt = txt.replace(/\\\{/g, "{");
txt = txt.replace(/\\\}/g, "}");
// Chemical ion superscript fix
txt=txt.replace(/([A-Za-z\)])\^\+/g,'$1<sup>+</sup>');
txt=txt.replace(/([A-Za-z\)])\^\-/g,'$1<sup>−</sup>');
txt=txt.replace(/([A-Za-z\)])\^\{([0-9]+)\+\}/g,'$1<sup>$2+</sup>');
txt=txt.replace(/([A-Za-z\)])\^\{([0-9]+)\-\}/g,'$1<sup>$2−</sup>');


// Auto-render fixes
txt=txt.replace(/\\,/g,"");
txt=txt.replace(/\\Omega/g,"Ω");
txt=txt.replace(/\\omega/g,"ω");
txt=txt.replace(/\\implies/g,"⇒");
txt=txt.replace(/\\therefore/g,"∴");
txt=txt.replace(/\\because/g,"∵");
txt=txt.replace(/\$/g,"");
txt=txt.replace(/\\\{/g,"{").replace(/\\\}/g,"}");
txt=txt.replace(/([A-Za-z])_([0-9]+)/g,"$1<sub>$2</sub>");
txt=txt.replace(/([A-Za-z\)])\^\+/g,"$1<sup>+</sup>");
txt=txt.replace(/([A-Za-z\)])\^\-/g,"$1<sup>−</sup>");
return txt;
}


const startTime = Date.now();
let currentQ = 0, score = 0; // score can be fractional due to -1/3 marking
let currentStreak=0,maxStreak=0;
let answered = new Array(data.length).fill(false);
let selectedAnswers=new Array(data.length).fill(null);
let answerCorrect=new Array(data.length).fill(null);
function showQ() {
let html=formatContent(data[currentQ].q);
if(data[currentQ].img){
html+=`<div style="text-align:center;margin:12px 0;"><img src="${data[currentQ].img}" alt="" style="display:block;max-width:100%;height:auto;margin:auto;border-radius:8px;"></div>`;
}
document.getElementById('q-text').innerHTML=html;
const tagBox=document.getElementById('exam-tag');
if(data[currentQ].tag){tagBox.innerHTML=formatContent(data[currentQ].tag);tagBox.style.display='block';}else{tagBox.innerText='';tagBox.style.display='none';}
let oBox = document.getElementById('options');
oBox.innerHTML = "";
document.getElementById('feedback').style.display = "none";
const prevSel=selectedAnswers[currentQ];
data[currentQ].o.forEach((opt, idx) => {
let btn = document.createElement("button");
btn.innerHTML = formatContent(opt);
btn.onclick = () => {
let btns = oBox.getElementsByTagName("button");
for(let b of btns) b.disabled = true;
if(idx === data[currentQ].a) {
btn.style.borderColor = "#388e3c";
btn.style.background = "#e8f5e9";
if(!answered[currentQ]) score += 1;
} else {
btn.style.borderColor = "#d32f2f";
btn.style.background = "#ffebee";
btns[data[currentQ].a].style.borderColor = "#388e3c";
btns[data[currentQ].a].style.background = "#e8f5e9";
if(!answered[currentQ]) score -= (1/3);
}
if(idx === data[currentQ].a){
currentStreak++;
if(currentStreak>maxStreak) maxStreak=currentStreak;
let msg="";
if(currentStreak===3) msg="🔥 3 Correct Streak!";
else if(currentStreak===5) msg="🚀 5 Correct Streak!";
else if(currentStreak===10) msg="💎 10 Correct Streak!";
else if(currentStreak===15) msg="👑 15 Correct Streak!";
else if(currentStreak===20) msg="🏆 20 Correct Streak!";
else if(currentStreak===30) msg="⚡ 30 Correct Streak!";
else if(currentStreak===50) msg="🌟 50 Correct Streak!";
else if(currentStreak===100) msg="💯 100 Correct Streak!";
if(msg){
celebrate(
msg,
currentStreak===3?'Keep Going!':
currentStreak===5?'Awesome!':
currentStreak===10?'Excellent!':
currentStreak===15?'Outstanding!':
currentStreak===20?'Champion!':
currentStreak===30?'Master!':
currentStreak===50?'Super Legend!':
'GOAT!'
);
}
}else{
currentStreak=0;
}
selectedAnswers[currentQ]=idx;
answerCorrect[currentQ]=(idx===data[currentQ].a);
answered[currentQ] = true;
document.getElementById("feedback").innerHTML="<b>व्याख्या:</b> "+formatContent(data[currentQ].e);
document.getElementById('feedback').style.display = "block";
};
oBox.appendChild(btn);
});
if(prevSel!==null){
 const btns=oBox.getElementsByTagName("button");
 for(let b of btns) b.disabled=true;
 btns[data[currentQ].a].style.borderColor="#388e3c";
 btns[data[currentQ].a].style.background="#e8f5e9";
 if(prevSel!==data[currentQ].a){
   btns[prevSel].style.borderColor="#d32f2f";
   btns[prevSel].style.background="#ffebee";
 }
 document.getElementById("feedback").innerHTML="<b>व्याख्या:</b> "+formatContent(data[currentQ].e);
 document.getElementById('feedback').style.display="block";
}
}


function celebrate(msg,sub){
 const p=document.getElementById('streakPopup');
 document.getElementById('streakTitle').innerText=msg;
 document.getElementById('streakSub').innerText=sub;
 p.classList.add('show');
 for(let i=0;i<28;i++){
   const b=document.createElement('div');
   b.className='burst';
   const r=document.getElementById('streakCard').getBoundingClientRect();
   b.style.left=(r.left+r.width/2)+'px';
   b.style.top=(r.top+r.height/2)+'px';
   b.style.setProperty('--x',(Math.random()*220-110)+'px');
   b.style.setProperty('--y',(Math.random()*140-70)+'px');
   p.appendChild(b);
   setTimeout(()=>b.remove(),1600);
 }
 setTimeout(()=>p.classList.remove('show'),1500);
}
function showScore(){
document.getElementById('quiz-box').style.display='none';
document.getElementById('controls').style.display='none';
document.getElementById('jumpBox').style.display='none';
let attempted=answered.filter(v=>v).length;
let correct=0;
for(let i=0;i<data.length;i++){
  if(answered[i]){
    // recompute from score impossible, inspect disabled state not available, so use score formula below
  }
}
let finalScore=score;
let wrong=Math.round((attempted-finalScore)*3/4);
correct=attempted-wrong;
let unattempted=data.length-attempted;
let accuracy=attempted?((correct/attempted)*100).toFixed(2):"0.00";
document.getElementById('score').innerText=finalScore.toFixed(2);
document.getElementById('total').innerText=data.length;
document.getElementById('correct').innerText=correct;
document.getElementById('wrong').innerText=wrong;
document.getElementById('attempted').innerText=attempted;
document.getElementById('unattempted').innerText=unattempted;
document.getElementById('accuracy').innerText=accuracy;
const endTime=Date.now();
const totalSeconds=Math.floor((endTime-startTime)/1000);
const minutes=Math.floor(totalSeconds/60);
const seconds=totalSeconds%60;
document.getElementById('timeTaken').innerText=
`${String(minutes).padStart(2,'0')}:${String(seconds).padStart(2,'0')}`;
document.getElementById('highestStreak').innerText=maxStreak;
const overallPercent=(Math.max(0,finalScore)/data.length)*100;
let badge='NEEDS PRACTICE',bg='#c62828';
if(overallPercent>=90){badge='EXCELLENT';bg='#2e7d32';}
else if(overallPercent>=75){badge='VERY GOOD';bg='#1565c0';}
else if(overallPercent>=60){badge='GOOD';bg='#ef6c00';}
else if(overallPercent>=40){badge='AVERAGE';bg='#8d6e63';}
const pb=document.getElementById('perfBadge');
pb.innerText=badge;pb.style.background=bg;
document.getElementById('score-card').style.display='block';
}
function nextQ() { if(currentQ < data.length - 1) { currentQ++; showQ(); } }
function prevQ() { if(currentQ > 0) { currentQ--; showQ(); } }
function confirmSubmit(){ if(confirm('क्या आप टेस्ट सबमिट करना चाहते हैं?')) showScore(); }
showQ();

function goToQuestion(qNo){
  qNo = parseInt(qNo,10);
  if(!Number.isFinite(qNo)) return;
  if(qNo<1 || qNo>data.length){
    alert("Valid range: 1 to "+data.length);
    return;
  }
  currentQ=qNo-1;
  showQ();
  var j=document.getElementById('jumpNo'); if(j) j.value='';
}
</script>
