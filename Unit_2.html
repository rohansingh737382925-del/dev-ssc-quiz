<style>
body { font-family: sans-serif; background-color: #f4f7f6; margin: 0; padding: 10px; display: flex; justify-content: center; }

.options button:disabled{
    opacity: 1;
    color: #222;
    -webkit-text-fill-color: #222;
}

.controls { display: flex; justify-content: space-between; margin-top: 20px; }
.nav-btn { padding: 10px 15px; border: none; border-radius: 5px; background: #1976d2; color: white; font-weight: bold; cursor: pointer; }
#submit-btn { background: #388e3c; width: 100%; margin-top: 10px; }


#streakPopup{
position:fixed;
inset:0;
display:none;
align-items:flex-start;
justify-content:center;
background:transparent;
pointer-events:none;
z-index:99999;
overflow:hidden;
}
#streakPopup.show{
display:flex;
}
#streakCard{
background:linear-gradient(135deg,#ffd54f,#fff8e1);
padding:16px 22px;
border-radius:18px;
text-align:center;
box-shadow:0 0 24px rgba(255,193,7,.55);
font-weight:bold;
max-width:320px;
width:72%;
margin-top:40px;
transform:none;
transition:none;
}
#streakPopup.show #streakCard{
background:linear-gradient(135deg,#ffd54f,#fff8e1);
padding:16px 22px;
border-radius:18px;
text-align:center;
box-shadow:0 0 24px rgba(255,193,7,.55);
transform:scale(.5);
transition:.3s;
font-weight:bold;
max-width:320px;
width:72%;
margin-top:40px;
}
.burst{
position:fixed;width:10px;height:10px;border-radius:50%;
background:#FFD700;box-shadow:0 0 10px #FFD700;pointer-events:none;animation:burst .8s ease-out forwards;
}
@keyframes burst{
to{transform:translate(var(--x),var(--y)) scale(0);opacity:0;}
}

</head>

function formatContent(txt){
 if(txt==null) return "";
 txt=String(txt);
 txt=txt.replace(/\\n/g,"<br>");
 while(/\\text\{([^{}]*)\}/.test(txt)){ txt=txt.replace(/\\text\{([^{}]*)\}/g,"$1"); }
 txt=txt.replace(/\^\{([^}]+)\}/g,"<sup>$1</sup>");
 txt=txt.replace(/_\{([^}]+)\}/g,"<sub>$1</sub>");
 txt=txt.replace(/([A-Za-z0-9\)\]])\^(-?\d+)/g,"$1<sup>$2</sup>");
 txt=txt.replace(/([A-Za-z])_([A-Za-z0-9]+)/g,"$1<sub>$2</sub>");
 txt=txt.replace(/\\frac\{([^{}]+)\}\{([^{}]+)\}/g,'<span style="display:inline-block;vertical-align:middle;text-align:center;"><span style="display:block;border-bottom:1px solid #000;padding:0 2px;">$1</span><span style="display:block;">$2</span></span>');
 txt=txt.replace(/\\sqrt\{([^{}]+)\}/g,"√($1)");
 txt=txt.replace(/\^\\circ/g,"°").replace(/\\circ/g,"°").replace(/\\Omega/g,"Ω").replace(/\\lambda/g,"λ").replace(/\\alpha/g,"α").replace(/\\beta/g,"β").replace(/\\gamma/g,"γ").replace(/\\times/g,"×").replace(/\\cdot/g,"·").replace(/\\div/g,"÷").replace(/\\pm/g,"±").replace(/\\approx/g,"≈").replace(/\\neq/g,"≠").replace(/\\geq?/g,"≥").replace(/\\leq?/g,"≤").replace(/\\Rightarrow/g,"⇒").replace(/\\rightarrow/g,"→").replace(/\\leftarrow/g,"←").replace(/\\%/g,"%");

 txt=txt.replace(/\\sin\b/g,"sin");
 txt=txt.replace(/\\cos\b/g,"cos");
 txt=txt.replace(/\\tan\b/g,"tan");
 txt=txt.replace(/\\cot\b/g,"cot");
 txt=txt.replace(/\\sec\b/g,"sec");
 txt=txt.replace(/\\csc\b/g,"csc");
 txt=txt.replace(/\\pi\b/g,"π");
 txt=txt.replace(/\\theta\b/g,"θ");
 txt=txt.replace(/\\rho\b/g,"ρ");
 txt=txt.replace(/\\phi\b/g,"φ");
 txt=txt.replace(/\\mu\b/g,"μ");
 txt=txt.replace(/\\sigma\b/g,"σ");
 txt=txt.replace(/\\omega\b/g,"ω");
 txt=txt.replace(/\\Delta\b/g,"Δ");
 txt=txt.replace(/\\propto\b/g,"∝");
 txt=txt.replace(/MATH_BLOCK_[0-9_]+/g,"");
 txt = txt.replace(/\\\{/g, "{");
txt = txt.replace(/\\\}/g, "}");
// Chemical ion superscript fix
txt=txt.replace(/([A-Za-z\)])\^\+/g,'$1<sup>+</sup>');
txt=txt.replace(/([A-Za-z\)])\^\-/g,'$1<sup>−</sup>');
txt=txt.replace(/([A-Za-z\)])\^\{([0-9]+)\+\}/g,'$1<sup>$2+</sup>');
txt=txt.replace(/([A-Za-z\)])\^\{([0-9]+)\-\}/g,'$1<sup>$2−</sup>');


// Auto-render fixes
txt=txt.replace(/\\,/g,"");
txt=txt.replace(/\\Omega/g,"Ω");
txt=txt.replace(/\\omega/g,"ω");
txt=txt.replace(/\\implies/g,"⇒");
txt=txt.replace(/\\therefore/g,"∴");
txt=txt.replace(/\\because/g,"∵");
txt=txt.replace(/\$/g,"");
txt=txt.replace(/\\\{/g,"{").replace(/\\\}/g,"}");
txt=txt.replace(/([A-Za-z])_([0-9]+)/g,"$1<sub>$2</sub>");
txt=txt.replace(/([A-Za-z\)])\^\+/g,"$1<sup>+</sup>");
txt=txt.replace(/([A-Za-z\)])\^\-/g,"$1<sup>−</sup>");
return txt;
}


const startTime = Date.now();
let currentQ = 0, score = 0; // score can be fractional due to -1/3 marking
let currentStreak=0,maxStreak=0;
let answered = new Array(data.length).fill(false);
let selectedAnswers=new Array(data.length).fill(null);
let answerCorrect=new Array(data.length).fill(null);
function showQ() {
document.getElementById('q-text').innerHTML = formatContent(data[currentQ].q);
const tagBox=document.getElementById('exam-tag');
if(data[currentQ].tag){tagBox.innerHTML=formatContent(data[currentQ].tag);tagBox.style.display='block';}else{tagBox.innerText='';tagBox.style.display='none';}
let oBox = document.getElementById('options');
oBox.innerHTML = "";
document.getElementById('feedback').style.display = "none";
const prevSel=selectedAnswers[currentQ];
data[currentQ].o.forEach((opt, idx) => {
let btn = document.createElement("button");
btn.innerHTML = formatContent(opt);
btn.onclick = () => {
let btns = oBox.getElementsByTagName("button");
for(let b of btns) b.disabled = true;
if(idx === data[currentQ].a) {
btn.style.borderColor = "#388e3c";
btn.style.background = "#e8f5e9";
if(!answered[currentQ]) score += 1;
} else {
btn.style.borderColor = "#d32f2f";
btn.style.background = "#ffebee";
btns[data[currentQ].a].style.borderColor = "#388e3c";
btns[data[currentQ].a].style.background = "#e8f5e9";
if(!answered[currentQ]) score -= (1/3);
}
if(idx === data[currentQ].a){
currentStreak++;
if(currentStreak>maxStreak) maxStreak=currentStreak;
let msg="";
if(currentStreak===3) msg="🔥 3 Correct Streak!";
else if(currentStreak===5) msg="🚀 5 Correct Streak!";
else if(currentStreak===10) msg="💎 10 Correct Streak!";
else if(currentStreak===15) msg="👑 15 Correct Streak!";
else if(currentStreak===20) msg="🏆 20 Correct Streak!";
else if(currentStreak===30) msg="⚡ 30 Correct Streak!";
else if(currentStreak===50) msg="🌟 50 Correct Streak!";
else if(currentStreak===100) msg="💯 100 Correct Streak!";
if(msg){
celebrate(
msg,
currentStreak===3?'Keep Going!':
currentStreak===5?'Awesome!':
currentStreak===10?'Excellent!':
currentStreak===15?'Outstanding!':
currentStreak===20?'Champion!':
currentStreak===30?'Master!':
currentStreak===50?'Super Legend!':
'GOAT!'
);
}
}else{
currentStreak=0;
}
selectedAnswers[currentQ]=idx;
answerCorrect[currentQ]=(idx===data[currentQ].a);
answered[currentQ] = true;
document.getElementById("feedback").innerHTML="<b>व्याख्या:</b> "+formatContent(data[currentQ].e);
document.getElementById('feedback').style.display = "block";
};
oBox.appendChild(btn);
});
if(prevSel!==null){
 const btns=oBox.getElementsByTagName("button");
 for(let b of btns) b.disabled=true;
 btns[data[currentQ].a].style.borderColor="#388e3c";
 btns[data[currentQ].a].style.background="#e8f5e9";
 if(prevSel!==data[currentQ].a){
   btns[prevSel].style.borderColor="#d32f2f";
   btns[prevSel].style.background="#ffebee";
 }
 document.getElementById("feedback").innerHTML="<b>व्याख्या:</b> "+formatContent(data[currentQ].e);
 document.getElementById('feedback').style.display="block";
}
}


function celebrate(msg,sub){
 const p=document.getElementById('streakPopup');
 document.getElementById('streakTitle').innerText=msg;
 document.getElementById('streakSub').innerText=sub;
 p.classList.add('show');
 for(let i=0;i<28;i++){
   const b=document.createElement('div');
   b.className='burst';
   const r=document.getElementById('streakCard').getBoundingClientRect();
   b.style.left=(r.left+r.width/2)+'px';
   b.style.top=(r.top+r.height/2)+'px';
   b.style.setProperty('--x',(Math.random()*220-110)+'px');
   b.style.setProperty('--y',(Math.random()*140-70)+'px');
   p.appendChild(b);
   setTimeout(()=>b.remove(),1600);
 }
 setTimeout(()=>p.classList.remove('show'),1500);
}
function showScore(){
document.getElementById('quiz-box').style.display='none';
document.getElementById('controls').style.display='none';
document.getElementById('jumpBox').style.display='none';
let attempted=answered.filter(v=>v).length;
let correct=0;
for(let i=0;i<data.length;i++){
  if(answered[i]){
    // recompute from score impossible, inspect disabled state not available, so use score formula below
  }
}
let finalScore=score;
let wrong=Math.round((attempted-finalScore)*3/4);
correct=attempted-wrong;
let unattempted=data.length-attempted;
let accuracy=attempted?((correct/attempted)*100).toFixed(2):"0.00";
document.getElementById('score').innerText=finalScore.toFixed(2);
document.getElementById('total').innerText=data.length;
document.getElementById('correct').innerText=correct;
document.getElementById('wrong').innerText=wrong;
document.getElementById('attempted').innerText=attempted;
document.getElementById('unattempted').innerText=unattempted;
document.getElementById('accuracy').innerText=accuracy;
const endTime=Date.now();
const totalSeconds=Math.floor((endTime-startTime)/1000);
const minutes=Math.floor(totalSeconds/60);
const seconds=totalSeconds%60;
document.getElementById('timeTaken').innerText=
`${String(minutes).padStart(2,'0')}:${String(seconds).padStart(2,'0')}`;
document.getElementById('highestStreak').innerText=maxStreak;
const overallPercent=(Math.max(0,finalScore)/data.length)*100;
let badge='NEEDS PRACTICE',bg='#c62828';
if(overallPercent>=90){badge='EXCELLENT';bg='#2e7d32';}
else if(overallPercent>=75){badge='VERY GOOD';bg='#1565c0';}
else if(overallPercent>=60){badge='GOOD';bg='#ef6c00';}
else if(overallPercent>=40){badge='AVERAGE';bg='#8d6e63';}
const pb=document.getElementById('perfBadge');
pb.innerText=badge;pb.style.background=bg;
document.getElementById('score-card').style.display='block';
}
function nextQ() { if(currentQ < data.length - 1) { currentQ++; showQ(); } }
function prevQ() { if(currentQ > 0) { currentQ--; showQ(); } }
function confirmSubmit(){ if(confirm('क्या आप टेस्ट सबमिट करना चाहते हैं?')) showScore(); }
showQ();

function goToQuestion(qNo){
  qNo = parseInt(qNo,10);
  if(!Number.isFinite(qNo)) return;
  if(qNo<1 || qNo>data.length){
    alert("Valid range: 1 to "+data.length);
    return;
  }
  currentQ=qNo-1;
  showQ();
  var j=document.getElementById('jumpNo'); if(j) j.value='';
}
</script>
