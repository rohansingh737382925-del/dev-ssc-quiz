<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POLITY - संविधान क्विज़</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f7f6; margin: 0; padding: 10px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 500px; background: #fff; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #d32f2f; font-size: 1.2rem; margin-bottom: 15px; }
        .question { font-weight: bold; margin-bottom: 15px; font-size: 1.05rem; line-height: 1.4; color: #333; }
        .options button { display: block; width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 8px; background: #fff; cursor: pointer; text-align: left; font-size: 0.95rem; }
        #feedback { margin-top: 15px; padding: 12px; background: #e3f2fd; border-left: 5px solid #1976d2; display: none; font-size: 0.9rem; line-height: 1.4; color: #444; }
        .controls { display: flex; justify-content: space-between; margin-top: 20px; }
        .nav-btn { padding: 10px 15px; border: none; border-radius: 5px; background: #1976d2; color: white; font-weight: bold; cursor: pointer; }
        #submit-btn { background: #388e3c; width: 100%; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2>POLITY</h2>
    <div id="quiz-box">
        <div id="q-text" class="question"></div>
        <div id="options" class="options"></div>
        <div id="feedback"></div>
    </div>
    <div id="controls">
        <div class="controls">
            <button class="nav-btn" onclick="prevQ()">⬅ पिछला</button>
            <button class="nav-btn" onclick="nextQ()">अगला ➡</button>
        </div>
        <button class="nav-btn" id="submit-btn" style="display:none;" onclick="showScore()">Submit Quiz</button>
    </div>
    <div id="score-card" style="display:none; text-align:center; padding: 20px;">
        <h3>आपका स्कोर: <span id="score"></span>/50</h3>
        <button class="nav-btn" style="background:#d32f2f;" onclick="location.reload()">दोबारा शुरू करें</button>
    </div>
</div>

<script>
    const data = [
        {q: "1. 1934 में पहली बार भारत के लिए संविधान सभा का विचार किसने दिया था?", o: ["(A) जवाहरलाल नेहरू", "(B) एम. एन. रॉय", "(C) महात्मा गांधी", "(D) सुभाष चंद्र बोस"], a: 1, e: "सही उत्तर: (B) एम. एन. रॉय\n* विश्लेषण: भारत में वामपंथी (कम्युनिस्ट) आंदोलन के प्रणेता एम. एन. रॉय ने वर्ष 1934 में पहली बार औपचारिक रूप से भारत के लिए एक स्वतंत्र संविधान सभा का विचार प्रस्तुत किया था।"},
        {q: "2. किस वर्ष भारतीय राष्ट्रीय कांग्रेस (INC) ने आधिकारिक तौर पर पहली बार संविधान सभा की मांग की थी?", o: ["(A) 1930", "(B) 1935", "(C) 1942", "(D) 1946"], a: 1, e: "सही उत्तर: (B) 1935\n* विश्लेषण: एम. एन. रॉय के विचार के बाद, भारतीय राष्ट्रीय कांग्रेस ने पहली बार 1935 में आधिकारिक तौर पर भारत का संविधान बनाने के लिए एक संविधान सभा के गठन की मांग रखी थी।"},
        {q: "3. 1928 में 'नेहरू रिपोर्ट' किसकी अध्यक्षता में प्रस्तुत की गई थी?", o: ["(A) जवाहरलाल नेहरू", "(B) मोतीलाल नेहरू", "(C) अरुण नेहरू", "(D) महात्मा गांधी"], a: 1, e: "सही उत्तर: (B) मोतीलाल नेहरू\n* विश्लेषण: अंग्रेजों की चुनौती को स्वीकार करते हुए भारतीय नेताओं ने 1928 में एक सर्वदलीय सम्मेलन में 'नेहरू रिपोर्ट' पेश की, जो भारतीय संविधान का पहला प्रारंभिक प्रारूप थी। इसके अध्यक्ष जवाहरलाल नेहरू के पिता मोतीलाल नेहरू थे।"},
        {q: "4. अंग्रेजों द्वारा प्रस्तावित 'डोमिनियन स्टेटस' (Dominion Status) का मूल अर्थ क्या था?", o: ["(A) पूर्ण स्वतंत्रता", "(B) ब्रिटिश साम्राज्य के अधीन रहते हुए स्व-शासन", "(C) पूरी तरह से सेना का शासन", "(D) केवल राजाओं का शासन"], a: 1, e: "सही उत्तर: (B) ब्रिटिश साम्राज्य के अधीन रहते हुए स्व-शासन\n* विश्लेषण: डोमिनियन स्टेटस का अर्थ था कि भारत ब्रिटिश क्राउन (साम्याज्य) का हिस्सा बना रहेगा, लेकिन उसे अपने आंतरिक मामलों में खुद शासन (Self-rule) करने की स्वायत्तता दी जाएगी, जिसे कांग्रेस ने बाद में पूरी तरह खारिज कर दिया था।"},
        {q: "5. 1946 में जब कैबिनेट मिशन भारत भेजा गया तब ब्रिटिश प्रधानमंत्री कौन थे?", o: ["(A) विंस्टन चर्चिल", "(B) क्लीमेंट एटली", "(C) रैमसे मैकडोनाल्ड", "(D) नेविल चेम्बरलेन"], a: 1, e: "सही उत्तर: (B) क्लीमेंट एटली\n* विश्लेषण: द्वितीय विश्व युद्ध के बाद ब्रिटेन में लेबर पार्टी की सरकार बनी और क्लीमेंट एटली वहां के प्रधानमंत्री बने। उन्होंने भारत की राजनीतिक समस्या के समाधान के लिए कैबिनेट मिशन को भारत भेजने की घोषणा की थी।"},
        {q: "6. भारत की संविधान सभा का गठन किस योजना के प्रस्तावों के तहत किया गया था?", o: ["(A) क्रिप्स मिशन, 1942", "(B) वेवेल योजना, 1945", "(C) कैबिनेट मिशन योजना, 1946", "(D) माउंटबेटन योजना, 1947"], a: 2, e: "सही उत्तर: (C) कैबिनेट मिशन योजना, 1946\n* विश्लेषण: भारत की संविधान सभा का व्यावहारिक गठन नवंबर 1946 में 'कैबिनेट मिशन योजना' द्वारा सुझाए गए प्रस्तावों के तहत ही किया गया था।"},
        {q: "7. कैबिनेट मिशन योजना के अनुसार संविधान सभा की कुल सदस्य संख्या (सीटें) कितनी निर्धारित की गई थी?", o: ["(A) 299", "(B) 389", "(C) 545", "(D) 296"], a: 1, e: "सही उत्तर: (B) 389\n* विश्लेषण: कैबिनेट मिशन योजना के तहत अविभाजित भारत के लिए संविधान सभा की कुल सदस्य संख्या 389 तय की गई थी, जिसमें ब्रिटिश भारत और देशी रियासतों के प्रतिनिधि दोनों शामिल थे।"},
        {q: "8. कुल 389 सीटों में से ब्रिटिश भारत के गवर्नरों के प्रांतों (Provincial Assemblies) को कितनी सीटें आवंटित की गई थीं?", o: ["(A) 292", "(B) 93", "(C) 4", "(D) 73"], a: 0, e: "सही उत्तर: (A) 292\n* विश्लेषण: कुल 389 सीटों में से 292 सीटें ब्रिटिश शासन के अधीन आने वाले 11 गवर्नरों के प्रांतों से चुनी जानी थीं।"},
        {q: "9. संविधान सभा में देशी रियासतों (Princely States) के प्रतिनिधित्व के लिए कितनी सीटें आवंटित की गई थीं?", o: ["(A) 292", "(B) 93", "(C) 4", "(D) 208"], a: 1, e: "सही उत्तर: (B) 93\n* विश्लेषण: भारत की रियासतों या राजा-रजवाड़ों के प्रतिनिधित्व के लिए संविधान सभा में 93 सीटें आवंटित की गई थीं। इन सीटों के सदस्यों का चुनाव नहीं होना था, बल्कि उन्हें राजाओं द्वारा नामांकित (मनोनीत) किया जाना था।"},
        {q: "10. कैबिनेट मिशन योजना में मुख्य आयुक्त के प्रांतों (Chief Commissioner's Provinces) के लिए कितनी सीटें आरक्षित थीं?", o: ["(A) 11", "(B) 93", "(C) 4", "(D) 15"], a: 2, e: "सही उत्तर: (C) 4\n* विश्लेषण: मुख्य आयुक्त के चार प्रांतों (दिल्ली, अजमेर-मेरवाड़ा, कूर्ग और ब्रिटिश बलूचिस्तान) के लिए कुल 4 सीटें निर्धारित की गई थीं (प्रत्येक प्रांत से 1 सीट)।"},
        {q: "11. संविधान सभा में सीटों का आवंटन प्रत्येक प्रांत को उसकी लगभग कितनी जनसंख्या के अनुपात में दिया गया था?", o: ["(A) प्रति 1ख", "(B) प्रति 5 लाख", "(C) प्रति 10 लाख", "(D) प्रति 50 लाख"], a: 2, e: "सही उत्तर: (C) प्रति 10 लाख\n* विश्लेषण: कैबिनेट मिशन के अनुसार, प्रत्येक प्रांत और देशी रियासत को सीटें उनकी जनसंख्या के अनुपात में दी गई थीं। मोटे तौर पर प्रति 10 लाख (1 मिलियन) की आबादी पर एक सीट आवंटित की गई थी।"},
        {q: "12. ब्रिटिश प्रांतों को आवंटित सीटों को मुख्य रूप से किन तीन समुदायों के बीच उनकी जनसंख्या के अनुपात में विभाजित किया गया था?", o: ["(A) हिंदू, मुस्लिम, ईसाई", "(B) मुस्लिम, सिख, सामान्य", "(C) हिंदू, सिख, बौद्ध", "(D) सामान्य, पिछड़ा, अल्पसंख्यक"], a: 1, e: "सही उत्तर: (B) मुस्लिम, सिख, सामान्य\n* विश्लेषण: ब्रिटिश प्रांतों की सीटों को तय करने के लिए आबादी को तीन मुख्य श्रेणियों में बांटा गया था—मुस्लिम, सिख (केवल पंजाब में) और सामान्य (जिसमें हिंदू, पारसी, ईसाई आदि सभी शामिल थे)।"},
        {q: "13. प्रांतीय विधानसभाओं से संविधान सभा के सदस्यों को चुनने के लिए किस चुनाव पद्धति का उपयोग किया गया था?", o: ["(A) प्रत्यक्ष वयस्क मताधिकार", "(B) आनुपातिक प्रतिनिधित्व और एकल हस्तांतरणीय मत पद्धति", "(C) पहले खंभा छूने की पद्धति (First-past-the-post)", "(D) केवल राज्यपाल द्वारा मनोनयन"], a: 1, e: "सही उत्तर: (B) आनुपातिक प्रतिनिधित्व और एकल हस्तांतरणीय मत पद्धति\n* विश्लेषण: संविधान सभा के सदस्यों का चुनाव सीधे जनता ने नहीं किया था, बल्कि प्रांतीय विधानसभाओं के सदस्यों द्वारा आनुपातिक प्रतिनिधित्व पद्धति के अनुसार एकल हस्तांतरणीय मत (Single Transferable Vote) के माध्यम से अप्रत्यक्ष रूप से किया गया था।"},
        {q: "14. संविधान सभा के सदस्यों को चुनने के लिए चुनाव किस वर्ष और किन महीनों में आयोजित किए गए थे?", o: ["(A) जनवरी-फरवरी 1946", "(B) जुलाई-अगस्त 1946", "(C) नवंबर-दिसंबर 1946", "(D) अगस्त-सितंबर 1947"], a: 1, e: "सही उत्तर: (B) जुलाई-अगस्त 1946\n* विश्लेषण: ब्रिटिश भारत को आवंटित 296 सीटों के लिए संविधान सभा के चुनाव जुलाई और अगस्त 1946 के महीनों में संपन्न हुए थे।"},
        {q: "15. 1946 के संविधान सभा चुनावों में भारतीय राष्ट्रीय कांग्रेस (INC) ने कुल कितनी सीटें जीें?", o: ["(A) 292", "(B) 208", "(C) 73", "(D) 389"], a: 1, e: "सही उत्तर: (B) 208\n* विश्लेषण: चुनावों के नतीजों में भारतीय राष्ट्रीय कांग्रेस सबसे बड़ी पार्टी बनकर उभरी और उसने शानदार प्रदर्शन करते हुए कुल 208 सीटों पर जीत दर्ज की।"},
        {q: "16. 1946 के चुनावों में मुस्लिम लीग को कुल कितनी सीटों पर जीत हासिल हुई थी?", o: ["(A) 208", "(B) 93", "(C) 73", "(D) 15"], a: 2, e: "सही उत्तर: (C) 73\n* विश्लेषण: चुनावों में मुस्लिम लीग को 73 सीटों पर जीत मिली थी। इस कम संख्या के कारण ही मुस्लिम लीग में असंतोष बढ़ा और उसने बाद में संविधान सभा का बहिष्कार करने का फैसला किया।"},
        {q: "17. 1946 के संविधान सभा चुनाव में निर्दलीयों और छोटे समूहों (छोटे दलों) को कुल कितनी सीटें प्राप्त हुई थीं?", o: ["(A) 4", "(B) 15", "(C) 73", "(D) 29"], a: 1, e: "सही उत्तर: (B) 15\n* विश्लेषण: कुल 296 सीटों के चुनावी नतीजों में से 208 कांग्रेस और 73 मुस्लिम लीग को मिली थीं, जबकि बची हुई 15 सीटें छोटे समूहों और स्वतंत्र (निर्दलीय) उम्मीदवारों के खाते में गईं।"},
        {q: "18. मुस्लिम लीग के हटने और भारत के विभाजन के बाद, भारतीय संविधान सभा में कुल कितने सदस्य शेष रह गए थे?", o: ["(A) 389", "(B) 299", "(C) 229", "(D) 284"], a: 1, e: "सही उत्तर: (B) 299\n* विश्लेषण: 3 जून 1947 की माउंटबेटन योजना के तहत विभाजन तय होने के बाद पाकिस्तान के क्षेत्रों के सदस्य अलग हो गए, जिससे भारतीय संविधान सभा की कुल सदस्य संख्या 389 से घटकर 299 रह गई।"},
        {q: "19. विभाजन के बाद, पुनर्गठित संविधान सभा में भारतीय प्रांतों (British Provinces) के लिए सीटों की संख्या घटकर कितनी हो गई थी?", o: ["(A) 296", "(B) 229", "(C) 70", "(D) 208"], a: 1, e: "सही उत्तर: (B) 229\n* विश्लेषण: विभाजन के बाद बची 299 सीटों में से भारतीय प्रांतों (गवर्नर और मुख्य आयुक्त के प्रांत मिलाकर) की संख्या घटकर 229 हो गई, जबकि देशी रियासतों की सीटें घटकर 70 रह गईं।"},
        {q: "20. भारत भेजे गए ब्रिटिश कैबिनेट मिशन (Cabinet Mission) के अध्यक्ष या प्रमुख कौन थे?", o: ["(A) स्टेफोर्ड क्रिप्स", "(B) ए. वी. अलेक्जेंडर", "(C) लॉर्ड पेथिक-लॉरेंस", "(D) लॉर्ड माउंटबेटन"], a: 2, e: "सही उत्तर: (C) लॉर्ड पेथिक-लॉरेंस\n* विश्लेषण: कैबिनेट मिशन में तीन ब्रिटिश कैबिनेट मंत्री शामिल थे—लॉर्ड पेथिक-लॉरेंस (भारत सचिव व मिशन के अध्यक्ष), स्टेफोर्ड क्रिप्स और ए. वी. अलेक्जेंडर।"},
        {q: "21. भारत की पहली अंतरिम सरकार (Interim Government) का गठन किस ऐतिहासिक तिथि को किया गया था?", o: ["(A) 9 दिसंबर 1946", "(B) 2 सितंबर 1946", "(C) 15 अगस्त 1947", "(D) 26 जनवरी 1950"], a: 1, e: "सही उत्तर: (B) 2 सितंबर 1946\n* विश्लेषण: भारत के सुचारू शासन और सत्ता के हस्तांतरण की प्रक्रिया शुरू करने के लिए 2 सितंबर 1946 को जवाहरलाल नेहरू के नेतृत्व में देश की पहली अंतरिम सरकार का गठन किया गया था।"},
        {q: "22. 1946 की अंतरिम सरकार में कार्यकारी परिषद के उपाध्यक्ष (Vice-President of the Executive Council) कौन थे?", o: ["(A) लॉर्ड वेवेल", "(B) जवाहरलाल नेहरू", "(C) सरदार पटेल", "(D) डॉ. राजेंद्र प्रसाद"], a: 1, e: "सही उत्तर: (B) जवाहरलाल नेहरू\n* विश्लेषण: अंतरिम सरकार में वायसराय कार्यकारी परिषद के अध्यक्ष बने रहे, जबकि पंडित जवाहरलाल नेहरू को परिषद का उपाध्यक्ष बनाया गया था, जो व्यवहार में प्रधानमंत्री के समान पद था। इसके साथ ही वे विदेशी मामलों के मंत्री भी थे।"},
        {q: "23. अंतरिम सरकार में गृह, सूचना एवं प्रसारण (Home, Information & Broadcasting) मंत्रालय का कार्यभार किसे सौंपा गया था?", o: ["(A) बलदेव सिंह", "(B) सरदार वल्लभभाई पटेल", "(C) जॉन मथाई", "(D) सी. राजगोपालाचारी"], a: 1, e: "सही उत्तर: (B) सरदार वल्लभभाई पटेल\n* विश्लेषण: 'लौह पुरुष' सरदार वल्लभभाई पटेल को अंतरिम सरकार में देश का पहला गृह मंत्री तथा सूचना एवं प्रसारण मंत्री नियुक्त किया गया था।"},
        {q: "24. स्वतंत्र भारत से पहले बनी अंतरिम सरकार में 'खाद्य एवं कृषि' (Food & Agriculture) मंत्री कौन बनाए गए थे?", o: ["(A) बाबू जगजीवन राम", "(B) डॉ. राजेंद्र प्रसाद", "(C) लियाकत अली खान", "(D) डॉ. सच्चिदानंद सिन्हा"], a: 1, e: "सही उत्तर: (B) डॉ. राजेंद्र प्रसाद\n* विश्लेषण: बिहार के प्रमुख नेता डॉ. राजेंद्र प्रसाद को अंतरिम सरकार में खाद्य एवं कृषि मंत्रालय का महत्वपूर्ण पोर्टफोलियो सौंपा गया था।"},
        {q: "25. अक्टूबर 1946 में जब मुस्लिम लीग अंतरिम सरकार में शामिल हुई, तो उसके कोटे से किसे 'वित्त मंत्री' (Finance Minister) बनाया गया था?", o: ["(A) जोगेन्द्र नाथ मंडल", "(B) लियाकत अली खान", "(C) गजनफर अली खान", "(D) अब्दुर रब निश्तार"], a: 1, e: "सही उत्तर: (B) लियाकत अली खान\n* विश्लेषण: शुरुआत में मुस्लिम लीग सरकार से बाहर थी, लेकिन अक्टूबर 1946 में वह शामिल हो गई। लीग के नेता लियाकत अली खान को अंतरिम सरकार में बेहद महत्वपूर्ण 'वित्त मंत्रालय' दिया गया था।"},
        {q: "26. अंतरिम सरकार (1946) में उद्योग एवं आपूर्ति (Industries & Supplies) मंत्री का पद किसके पास था?", o: ["(A) जॉन मथाई", "(B) सी. एच. भाभा", "(C) बलदेव सिंह", "(D) बाबू जगजीवन राम"], a: 0, e: "सही उत्तर: (A) जॉन मथाई\n* विश्लेषण: प्रसिद्ध अर्थशास्त्री डॉ. जॉन मथाई को अंतरिम सरकार के दौरान उद्योग एवं आपूर्ति विभाग का मंत्री नियुक्त किया गया था।"},
        {q: "27. अंतरिम सरकार में 'रक्षा मंत्री' (Defence Minister) के रूप में किसे नियुक्त किया गया था?", o: ["(A) बलदेव सिंह", "(B) अर्जुन सिंह", "(C) जगजीवन राम", "(D) सरदार पटेल"], a: 0, e: "सही उत्तर: (A) बलदेव सिंह\n* विश्लेषण: सरदार बलदेव सिंह को अंतरिम सरकार में रक्षा मंत्री का दायित्व सौंपा गया था, और स्वतंत्रता के बाद भी वे भारत के पहले रक्षा मंत्री बने रहे।"},
        {q: "28. अंतरिम सरकार में 'श्रम मंत्री' (Labour Minister) का पदभार किसने संभाला था?", o: ["(A) बाबू जगजीवन राम", "(B) जोगेन्द्र नाथ मंडल", "(C) सी. राजगोपालाचारी", "(D) जॉन मथाई"], a: 0, e: "सही उत्तर: (A) बाबू जगजीवन राम\n* विश्लेषण: बाबू जगजीवन राम को अंतरिम सरकार में देश का पहला श्रम मंत्री बनाया गया था। उन्होंने सबसे लंबे समय तक केंद्रीय मंत्री रहने का रिकॉर्ड भी बनाया।"},
        {q: "29. अंतरिम सरकार में विधि (कानून) मंत्री के पद पर मुस्लिम लीग कोटे से किसे नियुक्त किया गया था?", o: ["(A) जोगेन्द्र नाथ मंडल", "(B) लियाकत अली खान", "(C) आसफ अली", "(D) मोहम्मद अली जिन्ना"], a: 0, e: "सही उत्तर: (A) जोगेन्द्र नाथ मंडल\n* विश्लेषण: अंतरिम सरकार में कानून मंत्रालय का पदभार बंगाल के अनुसूचित जाति के नेता जोगेन्द्र नाथ मंडल को मुस्लिम लीग कोटे से सौंपा गया था। (नोट: आज़ाद भारत के पहले कानून मंत्री डॉ. बी. आर. अंबेडकर थे)।"},
        {q: "30. 1946 की अंतरिम सरकार में स्वास्थ्य मंत्री (Health Minister) का पदभार किसने संभाला था?", o: ["(A) गजनफर अली खान", "(B) राजकुमारी अमृत कौर", "(C) सी. एच. भाभा", "(D) इब्राहिम इस्माइल चुंदरीगर"], a: 0, e: "सही उत्तर: (A) गजनफर अली खान\n* विश्लेषण: अंतरिम सरकार के दौरान मुस्लिम लीग के सदस्य गजनफर अली खान को स्वास्थ्य मंत्री बनाया गया था। स्वतंत्रता के बाद राजकुमारी अमृत कौर देश की पहली महिला स्वास्थ्य मंत्री बनी थीं।"},
        {q: "31. ब्रिटिश भारत के दौरान गठित अंतरिम सरकार में शिक्षा एवं कला मंत्री (Education & Arts Minister) कौन थे?", o: ["(A) सी. राजगोपालाचारी", "(B) डॉ. एस. राधाकृष्णन", "(C) मौलाना अबुल कलाम आजाद", "(D) जवाहरलाल नेहरू"], a: 0, e: "सही उत्तर: (A) सी. राजगोपालाचारी\n* विश्लेषण: चक्रवर्ती राजगोपालाचारी (राजाजी) को अंतरिम सरकार में शिक्षा एवं कला मंत्री नियुक्त किया गया था। आज़ाद भारत के पहले शिक्षा मंत्री मौलाना अबुल कलाम आज़ाद बने थे।"},
        {q: "32. 1946 की अंतरिम सरकार में वाणिज्य मंत्री (Commerce Minister) के रूप में मुस्लिम लीग के किस सदस्य को शामिल किया गया था?", o: ["(A) इब्राहिम इस्माइल चुंदरीगर", "(B) अब्दुर रब निश्तार", "(C) लियाकत अली खान", "(D) जोगेन्द्र नाथ मंडल"], a: 0, e: "सही उत्तर: (A) इब्राहिम इस्माइल चुंदरीगर\n* विश्लेषण: मुस्लिम लीग के नेता इब्राहिम इस्माइल चुंदरीगर (आई. आई. चुंदरीगर) को अंतरिम सरकार में वाणिज्य (Commerce) मंत्रालय सौंपा गया था।"},
        {q: "33. अंतरिम सरकार में रेलवे, संचार, डाक एवं हवाई विभाग का मंत्री किसे नियुक्त किया गया था?", o: ["(A) अब्दुर रब निश्तार", "(B) आसफ अली", "(C) जॉन मथाई", "(D) रफी अहमद किदवई"], a: 0, e: "सही उत्तर: (A) अब्दुर रब निश्तार\n* विश्लेषण: अंतरिम सरकार में रेलवे और संचार जैसे महत्वपूर्ण तकनीकी मंत्रालयों का कार्यभार मुस्लिम लीग के सदस्य अब्दुर रब निश्तार को सौंपा गया था।"},
        {q: "34. अंतरिम सरकार (1946) में 'कार्य, खान एवं ऊर्जा' (Works, Mines & Power) मंत्रालय किसके अधीन था?", o: ["(A) सी. एच. भाभा", "(B) जॉन मथाई", "(C) बलदेव सिंह", "(D) जगजीवन राम"], a: 0, e: "सही उत्तर: (A) सी. एच. भाभा\n* विश्लेषण: पारसी समुदाय के नेता कोजी होरमुसजी भाभा (सी. एच. भाभा) को अंतरिम सरकार में कार्य, खान और ऊर्जा मंत्री नियुक्त किया गया था।"},
        {q: "35. संविधान सभा की 'संघ शक्ति समिति' (Union Powers Committee) के अध्यक्ष कौन थे?", o: ["(A) सरदार वल्लभभाई पटेल", "(B) डॉ. बी. आर. अंबेडकर", "(C) जवाहरलाल नेहरू", "(D) डॉ. राजेंद्र प्रसाद"], a: 2, e: "सही उत्तर: (C) जवाहरलाल नेहरू\n* विश्लेषण: पंडित जवाहरलाल नेहरू संविधान सभा की संघ शक्ति समिति और संघीय संविधान समिति दोनों के अध्यक्ष थे।"},
        {q: "36. प्रांतीय संविधान समिति (Provincial Constitution Committee) के प्रमुख कौन थे?", o: ["(A) जवाहरलाल नेहरू", "(B) सरदार वल्लभभाई पटेल", "(C) डॉ. राजेंद्र प्रसाद", "(D) जे. बी. कृपलानी"], a: 1, e: "सही उत्तर: (B) सरदार वल्लभभाई पटेल\n* विश्लेषण: देश के सभी प्रांतों व रियासतों के एकीकरण का जिम्मा संभालने वाले सरदार वल्लभभाई पटेल प्रांतीय संविधान समिति के अध्यक्ष बनाए गए थे।"},
        {q: "37. मौलिक अधिकारों, अल्पसंख्यकों और जनजातीय क्षेत्रों पर सलाहकार समिति (Advisory Committee) के अध्यक्ष कौन थे?", o: ["(A) सरदार वल्लभभाई पटेल", "(B) डॉ. बी. आर. अंबेडकर", "(C) जे. बी. कृपलानी", "(D) एच. सी. मुखर्जी"], a: 0, e: "सही उत्तर: (A) सरदार वल्लभभाई पटेल\n* विश्लेषण: सरदार वल्लभभाई पटेल इस सबसे बड़ी सलाहकार समिति के अध्यक्ष थे। इसके तहत मौलिक अधिकार उप-समिति के अध्यक्ष जे. बी. कृपलानी और अल्पसंख्यक उप-समिति के अध्यक्ष एच. सी. मुखर्जी थे।"},
        {q: "38. संविधान सभा की 'संचालन समिति' (Steering Committee) के प्रमुख कौन थे?", o: ["(A) जवाहरलाल नेहरू", "(B) डॉ. राजेंद्र प्रसाद", "(C) डॉ. बी. आर. अंबेडकर", "(D) के. एम. मुंशी"], a: 1, e: "सही उत्तर: (B) डॉ. राजेंद्र प्रसाद\n* विश्लेषण: संविधान सभा के अध्यक्ष होने के नाते डॉ. राजेंद्र प्रसाद ही पूरी सभा की 'संचालन समिति' (Steering Committee) के प्रमुख थे।"},
        {q: "39. संविधान सभा की 'प्रक्रिया नियम समिति' (Rules of Procedure Committee) के अध्यक्ष कौन थे?", o: ["(A) डॉ. राजेंद्र प्रसाद", "(B) डॉ. बी. आर. अंबेडकर", "(C) जवाहरलाल नेहरू", "(D) सरदार पटेल"], a: 0, e: "सही उत्तर: (A) डॉ. राजेंद्र प्रसाद\n* विश्लेषण: सभा की कार्यवाही और नियमों को तय करने वाली 'प्रक्रिया नियम समिति' की अध्यक्षता भी डॉ. राजेंद्र प्रसाद ने ही की थी।"},
        {q: "40. राष्ट्रीय ध्वज संबंधी तदर्थ समिति (Ad-hoc Committee on National Flag) की अध्यक्षता किसने की थी?", o: ["(A) डॉ. राजेंद्र प्रसाद", "(B) जवाहरलाल नेहरू", "(C) डॉ. बी. आर. अंबेडकर", "(D) सरोजिनी नायडू"], a: 0, e: "सही उत्तर: (A) डॉ. राजेंद्र प्रसाद\n* विश्लेषण: भारत के राष्ट्रीय ध्वज को अपनाने और उससे जुड़े फैसलों के लिए गठित तदर्थ (Ad-hoc) समिति के अध्यक्ष डॉ. राजेंद्र प्रसाद थे।"},
        {q: "41. संविधान सभा की 'सदन समिति' (House Committee) के अध्यक्ष कौन थे?", o: ["(A) बी. पट्टाभि सीतारमैया", "(B) जी. वी. मावलंकर", "(C) के. एम. मुंशी", "(D) जे. बी. कृपलानी"], a: 0, e: "सही उत्तर: (A) बी. पट्टाभि सीतारमैया\n* विश्लेषण: संविधान सभा के सदस्यों के आवास और अन्य आंतरिक व्यवस्थाओं से जुड़ी 'सदन समिति' के अध्यक्ष बी. पट्टाभि सीतारमैया थे।"},
        {q: "42. प्रत्यय पत्र या साख समिति (Credentials Committee) के अध्यक्ष के रूप में किसे नियुक्त किया गया था?", o: ["(A) अल्लादि कृष्णास्वामी अय्यर", "(B) एन. गोपालस्वामी अय्यंगर", "(C) डॉ. बी. आर. अंबेडकर", "(D) के. एम. मुंशी"], a: 0, e: "सही उत्तर: (A) अल्लादि कृष्णास्वामी अय्यर\n* विश्लेषण: सदस्यों के साख और योग्यता पत्रों की जांच करने वाली 'Credentials Committee' के अध्यक्ष प्रसिद्ध कानूनविद अल्लादि कृष्णास्वामी अय्यर थे।"},
        {q: "43. कार्य संचालन संबंधी समिति (Order of Business Committee) के अध्यक्ष कौन थे?", o: ["(A) डॉ. के. एम. मुंशी", "(B) जी. वी. मावलंकर", "(C) डॉ. राजेंद्र प्रसाद", "(D) जवाहरलाल नेहरू"], a: 0, e: "सही उत्तर: (A) डॉ. के. एम. मुंशी\n* विश्लेषण: संविधान सभा के दैनिक कार्यों की कार्यसूची तय करने वाली समिति के अध्यक्ष कन्हैयालाल माणिकलाल मुंशी (के. एम. मुंशी) थे।"},
        {q: "44. संविधान सभा के कार्यों संबंधी समिति (Committee on Functions) के प्रमुख कौन थे?", o: ["(A) जी. वी. मावलंकर", "(B) डॉ. राजेंद्र प्रसाद", "(C) जवाहरलाल नेहरू", "(D) सरदार पटेल"], a: 0, e: "सही उत्तर: (A) जी. वी. मावलंकर\n* विश्लेषण: संविधान सभा जब एक विधायी निकाय (संसद) के रूप में कार्य करती थी, तो उससे जुड़े कार्यों की समिति के प्रमुख गणेश वासुदेव मावलंकर (जी. वी. मावलंकर) थे।"},
        {q: "45. सभा द्वारा जून 1948 में नियुक्त 'भाषाई प्रांत आयोग' (Linguistic Provinces Commission) के अध्यक्ष कौन थे?", o: ["(A) एस. के. धर", "(B) फजल अली", "(C) जवाहरलाल नेहरू", "(D) वल्लभभाई पटेल"], a: 0, e: "सही उत्तर: (A) एस. के. धर\n* विश्लेषण: राज्यों का पुनर्गठन भाषा के आधार पर होना चाहिए या नहीं, इसकी जांच के लिए संविधान सभा के अध्यक्ष द्वारा इलाहाबाद उच्च न्यायालय के सेवानिवृत्त न्यायाधीश एस. के. धर की अध्यक्षता में 'धर आयोग' का गठन किया गया था।"},
        {q: "46. संविधान की 'प्रारूप समिति' (Drafting Committee) का गठन किस तिथि को हुआ था?", o: ["(A) 15 अगस्त 1947", "(B) 29 अगस्त 1947", "(C) 26 नवंबर 1949", "(D) 26 जनवरी 1950"], a: 1, e: "सही उत्तर: (B) 29 अगस्त 1947\n* विश्लेषण: स्वतंत्रता के ठीक दो सप्ताह बाद, 29 अगस्त 1947 को संविधान का अंतिम मसौदा (Draft) तैयार करने के लिए सबसे महत्वपूर्ण 'प्रारूप समिति' का गठन किया गया था।"},
        {q: "47. प्रारूप समिति के अध्यक्ष पद पर किसे नियुक्त किया गया था?", o: ["(A) डॉ. राजेंद्र प्रसाद", "(B) डॉ. बी. आर. अंबेडकर", "(C) जवाहरलाल नेहरू", "(D) बी. एन. राव"], a: 1, e: "सही उत्तर: (B) डॉ. बी. आर. अंबेडकर\n* विश्लेषण: बाबासाहब डॉ. भीमराव अंबेडकर को प्रारूप समिति का अध्यक्ष सर्वसम्मति से चुना गया था, जिन्होंने पूरे संविधान के लेखन का मार्गदर्शन किया।"},
        {q: "48. अध्यक्ष सहित प्रारूप समिति में कुल कितने सदस्य शामिल थे?", o: ["(A) 5", "(B) 7", "(C) 9", "(D) 11"], a: 1, e: "सही उत्तर: (B) 7\n* विश्लेषण: प्रारूप समिति में डॉ. बी. आर. अंबेडकर (अध्यक्ष) के अलावा 6 अन्य सदस्य थे, यानी कुल सदस्यों की संख्या 7 थी।"},
        {q: "49. खराब स्वास्थ्य के कारण प्रारूप समिति में बी. एल. मित्तर के हटने के बाद उनकी जगह किसे शामिल किया गया था?", o: ["(A) एन. माधव राव", "(B) टी. टी. कृष्णामचारी", "(C) के. एम. मुंशी", "(D) मोहम्मद सादुल्लाह"], a: 0, e: "सही उत्तर: (A) एन. माधव राव\n* विश्लेषण: प्रारूप समिति के मूल सदस्य बी. एल. मित्तर ने खराब स्वास्थ्य के कारण इस्तीफा दे दिया था, जिसके बाद उनके स्थान पर एन. माधव राव को सदस्य बनाया गया था।"},
        {q: "50. 1948 में डी. पी. खेतान की मृत्यु के बाद प्रारूप समिति में किस सदस्य को शामिल किया गया था?", o: ["(A) टी. टी. कृष्णामचारी", "(B) एन. माधव राव", "(C) अल्लादि कृष्णास्वामी अय्यर", "(D) एन. गोपालस्वामी अय्यंगर"], a: 0, e: "सही उत्तर: (A) टी. टी. कृष्णामचारी\n* विश्लेषण: 1948 में प्रारूप समिति के सदस्य डी. पी. खेतान का आकस्मिक निधन हो गया था, जिसके बाद उनके रिक्त स्थान को भरने के लिए टी. टी. कृष्णामचारी को नियुक्त किया गया था।"}
    ];

    let currentQ = 0, score = 0;
    let answered = new Array(data.length).fill(false);

    function showQ() {
        document.getElementById('q-text').innerText = data[currentQ].q;
        let oBox = document.getElementById('options');
        oBox.innerHTML = "";
        document.getElementById('feedback').style.display = "none";
        
        data[currentQ].o.forEach((opt, idx) => {
            let btn = document.createElement("button");
            btn.innerText = opt;
            btn.onclick = () => {
                let btns = oBox.getElementsByTagName("button");
                for(let b of btns) b.disabled = true;
                if(idx === data[currentQ].a) {
                    btn.style.borderColor = "#388e3c";
                    btn.style.background = "#e8f5e9";
                    if(!answered[currentQ]) score++;
                } else {
                    btn.style.borderColor = "#d32f2f";
                    btn.style.background = "#ffebee";
                    btns[data[currentQ].a].style.borderColor = "#388e3c";
                    btns[data[currentQ].a].style.background = "#e8f5e9";
                }
                answered[currentQ] = true;
                document.getElementById('feedback').innerHTML = "<b>व्याख्या:</b> " + data[currentQ].e;
                document.getElementById('feedback').style.display = "block";
            };
            oBox.appendChild(btn);
        });
        document.getElementById('submit-btn').style.display = (currentQ === data.length - 1) ? "block" : "none";
    }

    function showScore() {
        document.getElementById('quiz-box').style.display = "none";
        document.getElementById('controls').style.display = "none";
        document.getElementById('score').innerText = score;
        document.getElementById('score-card').style.display = "block";
    }

    function nextQ() { if(currentQ < data.length - 1) { currentQ++; showQ(); } }
    function prevQ() { if(currentQ > 0) { currentQ--; showQ(); } }

    showQ();
</script>
