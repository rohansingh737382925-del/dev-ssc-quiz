<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DREAM TO DESTINY - PYQ़</title>
<style>
body { font-family: sans-serif; background-color: #f4f7f6; margin: 0; padding: 10px; display: flex; justify-content: center; }
.container { width: 100%; max-width: 500px; background: #fff; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
h2 { text-align: center; color: #d32f2f; font-size: 1.2rem; margin-bottom: 15px; }
.question { font-weight: bold; margin-bottom: 15px; font-size: 1.05rem; line-height: 1.4; color: #333; }
.options button { display: block; width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 8px; background: #fff; cursor: pointer; text-align: left; font-size: 0.95rem; }
.options button:disabled{
    opacity: 1;
    color: #222;
    -webkit-text-fill-color: #222;
}
#feedback { margin-top: 15px; padding: 12px; background: #e3f2fd; border-left: 5px solid #1976d2; display: none; font-size: 0.9rem; line-height: 1.4; color: #444; }
.controls { display: flex; justify-content: space-between; margin-top: 20px; }
.nav-btn { padding: 10px 15px; border: none; border-radius: 5px; background: #1976d2; color: white; font-weight: bold; cursor: pointer; }
#submit-btn { background: #388e3c; width: 100%; margin-top: 10px; }


#streakPopup{
position:fixed;inset:0;display:flex;align-items:flex-start;justify-content:center;
background:transparent;opacity:0;pointer-events:none;transition:.25s;
}
#streakPopup.show{opacity:1;}
#streakCard{
background:linear-gradient(135deg,#ffd54f,#fff8e1);
padding:16px 22px;
border-radius:18px;
text-align:center;
box-shadow:0 0 24px rgba(255,193,7,.55);
transform:scale(.5);
transition:.3s;
font-weight:bold;
max-width:320px;
width:72%;
margin-top:40px;
}
#streakPopup.show #streakCard{
background:linear-gradient(135deg,#ffd54f,#fff8e1);
padding:16px 22px;
border-radius:18px;
text-align:center;
box-shadow:0 0 24px rgba(255,193,7,.55);
transform:scale(.5);
transition:.3s;
font-weight:bold;
max-width:320px;
width:72%;
margin-top:40px;
}
.burst{
position:absolute;width:10px;height:10px;border-radius:50%;
background:#ffd54f;animation:burst .8s ease-out forwards;
}
@keyframes burst{
to{transform:translate(var(--x),var(--y)) scale(0);opacity:0;}
}
}

</style>
</head>
<body>
<div id='streakPopup'><div id='streakCard'><div id='streakTitle' style='font-size:24px'></div><div id='streakSub' style='margin-top:40px;font-size:15px'>Keep Going!</div></div></div>
<div class="container">
<h2>DREAM TO DESTINY</h2>
<div id="quiz-box">
<div id="q-text" class="question"></div>
<div id="exam-tag" style="color:#d32f2f;font-weight:bold;margin:-5px 0 12px 0;"></div>
<div id="options" class="options"></div>
<div id="feedback"></div>
</div>
<div id="controls">
<div class="controls">
<button class="nav-btn" onclick="prevQ()">⬅ पिछला</button>
<button class="nav-btn" style="background:#388e3c;" onclick="confirmSubmit()">✅ Submit Test</button>
<button class="nav-btn" onclick="nextQ()">अगला ➡</button>
</div>
</div>

<div id="score-card" style="display:none;padding:20px;">
<div style="text-align:center;background:linear-gradient(145deg,#fff8dc 0%,#ffffff 45%,#f7f2d3 100%);border:1px solid #f1d46a;border-radius:18px;padding:20px;box-shadow:0 6px 16px rgba(0,0,0,.12);">
<div style="font-size:42px;">🏆</div>
<h2 style="margin:5px 0;color:#d32f2f;">TEST RESULT</h2>
<div style="font-size:38px;font-weight:bold;"><span id="score"></span>/<span id="total"></span></div>
<div id="perfBadge" style="display:inline-block;margin:10px auto;padding:8px 16px;border-radius:20px;background:#2e7d32;color:#fff;font-weight:bold;">EXCELLENT</div>

<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:40px;">
<div style="background:#e8f5e9;padding:12px;border-radius:12px;">✔<br><b id="correct"></b><br>Correct</div>
<div style="background:#ffebee;padding:12px;border-radius:12px;">❌<br><b id="wrong"></b><br>Wrong</div>
<div style="background:#e3f2fd;padding:12px;border-radius:12px;">📝<br><b id="attempted"></b><br>Attempted</div>
<div style="background:#fff8e1;padding:12px;border-radius:12px;">⏳<br><b id="unattempted"></b><br>Left</div>
<div style="background:#f3e5f5;padding:12px;border-radius:12px;">🎯<br><b><span id="accuracy"></span>%</b><br>Accuracy</div>
<div style="background:#ede7f6;padding:12px;border-radius:12px;">🔥<br><b id="highestStreak"></b><br>Streak</div>
</div>

<div style="margin:16px 0;font-size:20px;">⏱️ <b id="timeTaken"></b></div>
<button class="nav-btn" style="background:#d32f2f;" onclick="location.reload()">दोबारा शुरू करें</button>
</div>
</div>
</div>
<script>

const data = [
        {q: "Q1. भारतीय संविधान के मूल पाठ में कुल कितनी अनुसूचियाँ थीं?", o: ["(A) 8", "(B) 10", "(C) 12", "(D) 14"], a: 0, e: "* सही उत्तर: (A) * व्याख्या: 26 जनवरी 1950 को लागू मूल संविधान में केवल 8 अनुसूचियाँ थीं। बाद में विभिन्न संशोधनों द्वारा चार नई अनुसूचियाँ जोड़ी गईं, जिससे वर्तमान में इनकी संख्या 12 हो गई है।"},
        {q: "Q2. वर्तमान समय में भारतीय संविधान में कुल कितनी अनुसूचियाँ मौजूद हैं?", o: ["(A) 8", "(B) 9", "(C) 11", "(D) 12"], a: 3, e: "* सही उत्तर: (D) * व्याख्या: वर्तमान में संविधान में कुल 12 अनुसूचियाँ हैं। 9वीं, 10वीं, 11वीं और 12वीं अनुसूचियों को क्रमशः 1951, 1985, 1992 और 1992 में संशोधनों के माध्यम से जोड़ा गया था।"},
        {q: "Q3. भूमि सुधार और जमींदारी उन्मूलन से संबंधित अधिनियमों को किस अनुसूची के अंतर्गत रखा गया है?", o: ["(A) सातवीं अनुसूची", "(B) आठवीं अनुसूची", "(C) नौवीं अनुसूची", "(D) दसवीं अनुसूची"], a: 2, e: "* सही उत्तर: (C) * व्याख्या: नौवीं अनुसूची में राज्य द्वारा संपत्ति के अधिग्रहण और भूमि सुधार से जुड़े कानूनों को शामिल किया गया है, ताकि उन्हें न्यायिक समीक्षा (Judicial Review) से सुरक्षा मिल सके।"},
        {q: "Q4. भारतीय संविधान में नौवीं अनुसूची को किस संविधान संशोधन अधिनियम द्वारा जोड़ा गया था?", o: ["(A) प्रथम संशोधन, 1951", "(B) सातवां संशोधन, 1956", "(C) 42वां संशोधन, 1976", "(D) 44वां संशोधन, 1978"], a: 0, e: "* सही उत्तर: (A) * व्याख्या: प्रधानमंत्री जवाहरलाल नेहरू के कार्यकाल के दौरान देश में भूमि सुधार कानूनों को अदालती चुनौतियों से बचाने के लिए पहले ही संविधान संशोधन (1951) द्वारा नौवीं अनुसूची जोड़ी गई थी।"},
        {q: "Q5. संसद या राज्य विधानसभा के सदस्यों को 'दल-बदल' के आधार पर अयोग्य ठहराने का प्रावधान किस अनुसूची में है?", o: ["(A) नौवीं अनुसूची", "(B) दसवीं अनुसूची", "(C) ग्यारहवीं अनुसूची", "(D) बारहवीं अनुसूची"], a: 1, e: "* सही उत्तर: (B) * व्याख्या: दसवीं अनुसूची को 'दल-बदल विरोधी कानून' (Anti-Defection Law) कहा जाता है। इसके तहत कोई सांसद या विधायक यदि अपनी मूल पार्टी छोड़कर दूसरी पार्टी में जाता है, तो उसकी सदस्यता रद्द की जा सकती है।"},
        {q: "Q6. दल-बदल से संबंधित प्रावधानों वाली दसवीं अनुसूची को किस वर्ष और किस संशोधन द्वारा जोड़ा गया था?", o: ["(A) 44वां संशोधन, 1978", "(B) 52वां संशोधन, 1985", "(C) 73वां संशोधन, 1992", "(D) 91वां संशोधन, 2003"], a: 1, e: "* सही उत्तर: (B) * व्याख्या: साल 1985 में राजीव गांधी सरकार के दौरान 52वें संविधान संशोधन द्वारा दसवीं अनुसूची को जोड़ा गया था, जिसका उद्देश्य राजनीतिक अस्थिरता को रोकना था।"},
        {q: "Q7. पंचायती राज संस्थाओं को संवैधानिक दर्जा देने वाली ग्यारहवीं अनुसूची को किस संशोधन द्वारा शामिल किया गया?", o: ["(A) 71वां संशोधन", "(B) 72वां संशोधन", "(C) 73वां संशोधन", "(D) 74वां संशोधन"], a: 2, e: "* सही उत्तर: (C) * व्याख्या: वर्ष 1992 में पारित किए गए 73वें संविधान संशोधन अधिनियम द्वारा संविधान में ग्यारहवीं अनुसूची जोड़ी गई, जिसने ग्रामीण स्थानीय स्वशासन (पंचायतों) को मजबूत किया।"},
        {q: "Q8. भारतीय संविधान की ग्यारहवीं अनुसूची में पंचायतों को कार्य करने के लिए कुल कितने विषय सौंपे गए हैं?", o: ["(A) 18 विषय", "(B) 22 विषय", "(C) 28 विषय", "(D) 29 विषय"], a: 3, e: "* सही उत्तर: (D) * व्याख्या: ग्यारहवीं अनुसूची के तहत पंचायतों को स्थानीय विकास, कृषि, स्वास्थ्य और स्वच्छता जैसे कुल 29 कार्यात्मक विषयों (Functional Items) पर कानून बनाने और काम करने की शक्ति दी गई है।"},
        {q: "Q9. शहरी स्थानीय निकायों यानी नगरपालिकाओं से संबंधित प्रावधान संविधान की किस अनुसूची में दिए गए हैं?", o: ["(A) नौवीं अनुसूची", "(B) दसवीं अनुसूची", "(C) ग्यारहवीं अनुसूची", "(D) बारहवीं अनुसूची"], a: 3, e: "* सही उत्तर: (D) * व्याख्या: बारहवीं अनुसूची शहरी स्थानीय सरकारों (नगर निगम, नगरपालिका और नगर पंचायतों) की शक्तियों, अधिकारों और जिम्मेदारियों को स्पष्ट करती है।"},
        {q: "Q10. 74वें संविधान संशोधन अधिनियम (1992) द्वारा जोड़ी गई बारहवीं अनुसूची में नगरपालिकाओं के पास कितने विषय हैं?", o: ["(A) 14 विषय", "(B) 18 विषय", "(C) 24 विषय", "(D) 29 विषय"], a: 1, e: "* सही उत्तर: (B) * व्याख्या: बारहवीं अनुसूची में नगरपालिकाओं को शहरी योजना, सड़कों, पुलों और सार्वजनिक स्वास्थ्य जैसे कुल 18 विषयों पर कार्य करने का अधिकार दिया गया है।"},
        {q: "Q11. भारतीय संविधान की आठवीं अनुसूची का मुख्य संबंध निम्नलिखित में से किससे है?", o: ["(A) राज्यसभा सीटों का आवंटन", "(B) संघ और राज्यों के बीच शक्तियों का विभाजन", "(C) भारत की आधिकारिक भाषाएँ", "(D) अनुसूचित क्षेत्रों का प्रशासन"], a: 2, e: "* सही उत्तर: (C) * व्याख्या: आठवीं अनुसूची भारत गणराज्य की आधिकारिक भाषाओं की सूची से संबंधित है। संविधान के भाग 17 के अनुच्छेद 344(1) और 351 के तहत इसका प्रावधान है।"},
        {q: "Q12. मूल रूप से भारतीय संविधान की आठवीं अनुसूची में कुल कितनी भाषाओं को मान्यता दी गई थी?", o: ["(A) 12", "(B) 14", "(C) 18", "(D) 22"], a: 1, e: "* सही उत्तर: (B) * व्याख्या: जब 1950 में संविधान लागू हुआ, तब आठवीं अनुसूची में केवल 14 भाषाएँ (असमिया, बंगाली, गुजराती, हिंदी, कन्नड़, कश्मीरी, मलयालम, मराठी, ओड़िया, पंजाबी, संस्कृत, तमिल, तेलुगू और उर्दू) शामिल थीं।"},
        {q: "Q13. वर्तमान समय में भारतीय संविधान की आठवीं अनुसूची में कुल कितनी आधिकारिक भाषाएँ दर्ज हैं?", o: ["(A) 14", "(B) 20", "(C) 22", "(D) 25"], a: 2, e: "* सही उत्तर: (C) * व्याख्या: विभिन्न वर्षों में हुए तीन संवैधानिक संशोधनों (21वें, 71वें और 92वें) के माध्यम से 8 नई भाषाएँ जोड़ी गईं, जिससे अब कुल आधिकारिक भाषाओं की संख्या 22 हो चुकी है।"},
        {q: "Q14. 21वें संविधान संशोधन अधिनियम, 1967 द्वारा आठवीं अनुसूची में जोड़ी जाने वाली 15वीं भाषा कौन-सी थी?", o: ["(A) कोंकणी", "(B) सिंधी", "(C) नेपाली", "(D) कश्मीरी"], a: 1, e: "* सही उत्तर: (B) * व्याख्या: स्वतंत्रता के बाद सबसे पहला भाषा संशोधन 1967 में 21वें संशोधन के रूप में हुआ, जिसके तहत सिंधी भाषा को देश की 15वीं आधिकारिक भाषा के रूप में मान्यता दी गई।"},
        {q: "Q15. वर्ष 1992 में हुए 71वें संविधान संशोधन अधिनियम द्वारा किन तीन भाषाओं को एक साथ अनुसूची 8 में शामिल किया गया था?", o: ["(A) बोडो, डोगरी, संथाली", "(B) सिंधी, कोंकणी, मणिपुरी", "(C) कोंकणी, मणिपुरी, नेपाली", "(D) मैथिली, डोगरी, नेपाली"], a: 2, e: "* सही उत्तर: (C) * व्याख्या: 71वें संशोधन (1992) द्वारा कोंकणी, मणिपुरी और नेपाली भाषाओं को शामिल किया गया। इसे याद रखने की आसान ट्रिक 'KMN' (कोंकणी, मणिपुरी, नेपाली) है।"},
        {q: "Q16. 92वें संविधान संशोधन अधिनियम, 2003 द्वारा निम्नलिखित में से कौन-सी भाषा आठवीं अनुसूची में नहीं जोड़ी गई थी?", o: ["(A) बोडो", "(B) मैथिली", "(C) मणिपुरी", "(D) संथाली"], a: 2, e: "* सही उत्तर: (C) * व्याख्या: 92वें संशोधन द्वारा चार भाषाएँ- बोडो, डोगरी, मैथिली और संथाली (ट्रिक: BDSM) जोड़ी गई थीं। मणिपुरी को इससे पहले ही 1992 के 71वें संशोधन द्वारा जोड़ दिया गया था।"},
        {q: "Q17. किस वर्ष संसद द्वारा 92वां संविधान संशोधन अधिनियम पारित किया गया, जिसके तहत चार नई भाषाएँ जोड़ी गईं?", o: ["(A) 1992", "(B) 2000", "(C) 2003", "(D) 2011"], a: 2, e: "* सही उत्तर: (C) * व्याख्या: वर्ष 2003 में 92वें संविधान संशोधन के माध्यम से बोडो, डोगरी, मैथिली और संथाली को जोड़ा गया, जिससे भाषाओं की संख्या 18 से बढ़कर 22 हो गई।"},
        {q: "Q18. वर्ष 2011 में हुए 96वें संविधान संशोधन अधिनियम का मुख्य उद्देश्य क्या था?", o: ["(A) एक नई भाषा को जोड़ना", "(B) 'उड़िया' भाषा का नाम बदलकर 'ओड़िया' करना", "(C) अंग्रेजी को हटाना", "(D) संस्कृत को अनिवार्य करना"], a: 1, e: "* सही उत्तर: (B) * व्याख्या: 96वें संशोधन अधिनियम, 2011 द्वारा आठवीं अनुसूची में दर्ज भाषा 'उड़िया' (Uriya) की वर्तनी और नाम को बदलकर आधिकारिक तौर पर 'ओड़िया' (Odia) कर दिया गया था।"},
        {q: "Q19. कोंकणी, जो कि गोवा की मुख्य भाषा है, को किस संशोधन के माध्यम से संवैधानिक भाषाओं की सूची में स्थान मिला?", o: ["(A) 21वां संशोधन", "(B) 71वां संशोधन", "(C) 92वां संशोधन", "(D) 96वां संशोधन"], a: 1, e: "* सही उत्तर: (B) * व्याख्या: कोंकणी भाषा को वर्ष 1992 के 71वें संविधान संशोधन अधिनियम के तहत आधिकारिक भाषाओं की सूची में शामिल किया गया था।"},
        {q: "Q20. जम्मू-कश्मीर के कुछ हिस्सों में बोली जाने वाली 'डोगरी' भाषा को किस संशोधन के द्वारा संविधान में शामिल किया गया?", o: ["(A) 21वां संशोधन", "(B) 71वां संशोधन", "(C) 92वां संशोधन", "(D) 96वां संशोधन"], a: 2, e: "* सही उत्तर: (C) * व्याख्या: डोगरी भाषा को वर्ष 2003 के 92वें संविधान संशोधन अधिनियम के तहत बोडो, मैथिली और संथाली के साथ आठवीं अनुसूची में शामिल किया गया था।"},
        {q: "Q21. भारत सरकार द्वारा किस वर्ष भाषाओं को 'शास्त्रीय भाषा' (Classical Language) का विशेष दर्जा देने की शुरुआत की गई?", o: ["(A) 2000", "(B) 2002", "(C) 2004", "(D) 2006"], a: 2, e: "* सही उत्तर: (C) * व्याख्या: भारत सरकार ने वर्ष 2004 में तमिल भाषा को सबसे पहले यह दर्जा देकर 'शास्त्रीय भाषा' की एक नई श्रेणी बनाने का फैसला किया था।"},
        {q: "Q22. भारत की प्रथम भाषा कौन-सी है जिसे 'शास्त्रीय भाषा' का गौरव प्राप्त हुआ था?", o: ["(A) संस्कृत", "(B) तमिल", "(C) तेलुगू", "(D) कन्नड़"], a: 1, e: "* सही उत्तर: (B) * व्याख्या: तमिल भारत की पहली भाषा थी जिसे वर्ष 2004 में शास्त्रीय भाषा (Classical Language) घोषित किया गया था, क्योंकि इसका इतिहास और साहित्य बेहद प्राचीन है।"},
        {q: "Q23. संस्कृत भाषा को भारत सरकार द्वारा किस वर्ष शास्त्रीय भाषा की सूची में शामिल किया गया था?", o: ["(A) 2004", "(B) 2005", "(C) 2008", "(D) 2013"], a: 1, e: "* सही उत्तर: (B) * व्याख्या: तमिल के ठीक अगले वर्ष, यानी 2005 में, संस्कृत की प्राचीनता और समृद्ध साहित्यिक परंपरा को देखते हुए इसे भारत की दूसरी शास्त्रीय भाषा घोषित किया गया।"},
        {q: "Q24. दक्षिण भारत की दो प्रमुख भाषाओं 'कन्नड़' और 'तेलुगू' को किस वर्ष एक साथ शास्त्रीय भाषा का दर्जा दिया गया था?", o: ["(A) 2005", "(B) 2006", "(C) 2008", "(D) 2014"], a: 2, e: "* सही उत्तर: (C) * व्याख्या: वर्ष 2008 में संस्कृति मंत्रालय द्वारा एक साथ कर्नाटक की 'कन्नड़' और आंध्र प्रदेश/तेलंगाना की 'तेलुगू' भाषा को शास्त्रीय भाषा का दर्जा प्रदान किया गया था।"},
        {q: "Q25. केरल राज्य में बोली जाने वाली 'मलयालम' भाषा को किस वर्ष शास्त्रीय भाषा के रूप में अधिसूचित किया गया था?", o: ["(A) 2008", "(B) 2011", "(C) 2013", "(D) 2014"], a: 2, e: "* सही उत्तर: (C) * व्याख्या: मलयालम को वर्ष 2013 में भारत की पांचवीं शास्त्रीय भाषा के रूप में मान्यता दी गई थी।"},
        {q: "Q26. ओड़िया भाषा को किस वर्ष भारत की छठवीं शास्त्रीय भाषा के रूप में स्वीकृति दी गई थी?", o: ["(A) 2011", "(B) 2013", "(C) 2014", "(D) 2016"], a: 2, e: "* सही उत्तर: (C) * व्याख्या: ओड़िया भाषा को वर्ष 2014 में शास्त्रीय भाषा घोषित किया गया था। यह वर्ष 2024 से पहले तक घोषित की गई आखिरी (छठवीं) शास्त्रीय भाषा थी।"},
        {q: "Q27. अक्टूबर 2024 में केंद्रीय मंत्रिमंडल द्वारा एक साथ कितनी नई भाषाओं को शास्त्रीय भाषा का दर्जा देने की ऐतिहासिक मंजूरी दी गई?", o: ["(A) 3", "(B) 4", "(C) 5", "(D) 6"], a: 2, e: "* सही उत्तर: (C) * व्याख्या: अक्टूबर 2024 में प्रधानमंत्री नरेंद्र मोदी की अध्यक्षता में केंद्रीय मंत्रिमंडल ने एक साथ 5 नई क्षेत्रीय व प्राचीन भाषाओं को शास्त्रीय भाषा का दर्जा देने की मंजूरी दी।"},
        {q: "Q28. निम्नलिखित में से कौन-सी भाषा अक्टूबर 2024 में जोड़ी गई 5 नई शास्त्रीय भाषाओं की सूची में शामिल नहीं है?", o: ["(A) मराठी", "(B) पालि", "(C) कोंकणी", "(D) असमिया"], a: 2, e: "* सही उत्तर: (C) * व्याख्या: अक्टूबर 2024 में मराठी, पालि, प्राकृत, असमिया और बंगाली को शामिल किया गया था। कोंकणी इसमें शामिल नहीं है, वह केवल आठवीं अनुसूची की आधिकारिक भाषा है।"},
        {q: "Q29. बौद्ध धर्म के ग्रंथों में मुख्य रूप से प्रयुक्त होने वाली किस प्राचीन भाषा को हाल ही में (2024) शास्त्रीय भाषा का दर्जा मिला है?", o: ["(A) प्राकृत", "(B) पालि", "(C) संस्कृत", "(D) अपभ्रंश"], a: 1, e: "* सही उत्तर: (B) * व्याख्या: पालि भाषा का बौद्ध साहित्य और भारतीय इतिहास में गहरा योगदान रहा है। इसकी प्राचीनता को देखते हुए सरकार ने अक्टूबर 2024 में इसे शास्त्रीय भाषा का दर्जा दिया।"},
        {q: "Q30. जैन धर्म के प्राचीन ग्रंथों और अभिलेखों में प्रयुक्त होने वाली 'प्राकृत' भाषा को किस वर्ष शास्त्रीय भाषा घोषित किया गया?", o: ["(A) 2005", "(B) 2014", "(C) 2024", "(D) 2026"], a: 2, e: "* सही उत्तर: (C) * व्याख्या: प्राकृत भाषा को भी अक्टूबर 2024 में अन्य चार भाषाओं के साथ भारत की शास्त्रीय भाषा के रूप में शामिल किया गया था।"},
        {q: "Q31. अक्टूबर 2024 में हुए नए बदलावों के बाद, भारत में वर्तमान में कुल शास्त्रीय भाषाओं (Classical Languages) की संख्या कितनी हो गई है?", o: ["(A) 6", "(B) 8", "(C) 11", "(D) 12"], a: 2, e: "* सही उत्तर: (C) * व्याख्या: पहले कुल 6 शास्त्रीय भाषाएँ थीं। अक्टूबर 2024 में 5 नई भाषाएँ (मराठी, पालि, प्राकृत, असमिया, बंगाली) और जुड़ गईं, जिससे अब कुल संख्या बढ़कर 11 हो गई है।"},
        {q: "Q32. भारतीय संविधान में \"मजबूत केंद्र के साथ संघीय व्यवस्था\" (Federal System with a Strong Centre) का विचार किस देश के संविधान से लिया गया है?", o: ["(A) अमेरिका", "(B) कनाडा", "(C) ऑस्ट्रेलिया", "(D) सोवियत संघ"], a: 1, e: "* सही उत्तर: (B) * व्याख्या: भारत में केंद्र और राज्यों के बीच शक्तियों का विभाजन है, लेकिन केंद्र को अधिक मजबूत बनाया गया है। यह विशिष्ट संघीय ढांचा कनाडा के संविधान से प्रेरित है।"},
        {q: "Q33. भारतीय प्रशासनिक और कानूनी व्यवस्था में \"विधि का शासन\" (Rule of Law) का सिद्धांत किस देश से लिया गया है?", o: ["(A) संयुक्त राज्य अमेरिका", "(B) फ्रांस", "(C) आयरलैंड", "(D) ब्रिटेन (UK)"], a: 3, e: "* सही उत्तर: (D) * व्याख्या: 'विधि का शासन' का अर्थ है कि कानून के सामने सब बराबर हैं और कानून से ऊपर कोई नहीं है। यह सिद्धांत ब्रिटिश संवैधानिक प्रणाली से लिया गया है।"},
        {q: "Q34. भारतीय संविधान की कौन-सी अनुसूची देश के विभिन्न राज्यों और केंद्र शासित प्रदेशों के लिए 'राज्यसभा में सीटों के आवंटन' से संबंधित है?", o: ["(A) दूसरी अनुसूची", "(B) तीसरी अनुसूची", "(C) चौथी अनुसूची", "(D) पांचवीं अनुसूची"], a: 2, e: "* सही उत्तर: (C) * व्याख्या: चौथी अनुसूची में यह प्रावधान है कि किस राज्य या केंद्र शासित प्रदेश से राज्यसभा (उच्च सदन) में कितनी सीटें आवंटित की जाएंगी।"},
        {q: "Q35. संविधान की किस अनुसूची के अंतर्गत राष्ट्रपति, राज्यपाल, लोकसभा अध्यक्ष और न्यायाधीशों के वेतन, भत्ते और पेंशन का विवरण दिया गया है?", o: ["(A) पहली अनुसूची", "(B) दूसरी अनुसूची", "(C) तीसरी अनुसूची", "(D) चौथी अनुसूची"], a: 1, e: "* सही उत्तर: (B) * व्याख्या: दूसरी अनुसूची भारत के विभिन्न संवैधानिक पदाधिकारियों के वेतन, भत्ते (Emoluments) और विशेषाधिकारों से संबंधित है।"},
        {q: "Q36. भारत के मंत्रियों, सांसदों और न्यायाधीशों द्वारा पद ग्रहण के समय ली जाने वाली 'शपथ और प्रतिज्ञान' (Oaths and Affirmations) का प्रारूप किस अनुसूची में है?", o: ["(A) दूसरी अनुसूची", "(B) तीसरी अनुसूची", "(C) पांचवीं अनुसूची", "(D) सातवीं अनुसूची"], a: 1, e: "* सही उत्तर: (B) * व्याख्या: तीसरी अनुसूची में विभिन्न संवैधानिक पदों के लिए शपथ के प्रारूप दिए गए हैं। ध्यान रहे कि राष्ट्रपति की शपथ का प्रारूप इसमें नहीं बल्कि अनुच्छेद 60 में है।"},
        {q: "Q37. संघ सूची, राज्य सूची और समवर्ती सूची के माध्यम से केंद्र और राज्यों के बीच शक्तियों का विभाजन किस अनुसूची में वर्णित है?", o: ["(A) पांचवीं अनुसूची", "(B) छठी अनुसूची", "(C) सातवीं अनुसूची", "(D) आठवीं अनुसूची"], a: 2, e: "* सही उत्तर: (C) * व्याख्या: सातवीं अनुसूची में तीन सूचियाँ हैं: संघ सूची (केंद्र के कानून), राज्य सूची (राज्य के कानून) और समवर्ती सूची (दोनों के कानून), जो शक्तियों के स्पष्ट बंटवारे को दर्शाती हैं।"},
        {q: "Q38. असमिया भाषा को मूल संविधान (14 भाषाओं) में शामिल किया गया था। इसे वर्तमान में किस राज्य की शास्त्रीय भाषा का भी दर्जा (2024 में) मिल चुका है?", o: ["(A) मेघालय", "(B) त्रिपुरा", "(C) असम", "(D) मणिपुर"], a: 2, e: "* सही उत्तर: (C) * व्याख्या: असमिया भाषा असम की मुख्य भाषा है। यह प्रारंभ से ही 8वीं अनुसूची में थी और अक्टूबर 2024 में इसे भारत सरकार द्वारा शास्त्रीय भाषा का दर्जा भी दे दिया गया।"},
        {q: "Q39. निम्नलिखित में से कौन-सा जोड़ा सही सुमेलित नहीं है?", o: ["(A) 9वीं अनुसूची - प्रथम संशोधन (1951)", "(B) 10वीं अनुसूची - 52वां संशोधन (1985)", "(C) 11वीं अनुसूची - 74वां संशोधन (1993)", "(D) 12वीं अनुसूची - 74वां संशोधन (1992)"], a: 2, e: "* सही उत्तर: (C) * व्याख्या: विकल्प (C) गलत है क्योंकि 11वीं अनुसूची (पंचायती राज) को 73वें संविधान संशोधन द्वारा जोड़ा गया था, न कि 74वें द्वारा। 74वां संशोधन 12वीं अनुसूची (नगरपालिका) से संबंधित है।"},
        {q: "Q40. मैथिली भाषा, जिसे 2003 के 92वें संशोधन द्वारा जोड़ा गया था, मुख्य रूप से भारत के किस राज्य में बोली जाती है?", o: ["(A) झारखंड", "(B) बिहार", "(C) उड़ीसा", "(D) छत्तीसगढ़"], a: 1, e: "* सही उत्तर: (B) * व्याख्या: मैथिली मुख्य रूप से बिहार के मिथिला क्षेत्र और नेपाल के कुछ हिस्सों में बोली जाने वाली एक समृद्ध भाषा है, जिसे 2003 में संवैधानिक दर्जा मिला।"},
        {q: "Q41. भारत के किस पड़ोसी देश की राजभाषा 'नेपाली' को भारतीय संविधान की आठवीं अनुसूची में भी शामिल किया गया है?", o: ["(A) भूटान", "(B) नेपाल", "(C) म्यांमार", "(D) श्रीलंका"], a: 1, e: "* सही उत्तर: (B) * व्याख्या: नेपाल की आधिकारिक भाषा 'नेपाली' भारत के सिक्किम और पश्चिम बंगाल (दार्जिलिंग) में बड़े पैमाने पर बोली जाती है, इसलिए इसे 1992 के 71वें संशोधन द्वारा आठवीं अनुसूची में जगह दी गई।"},
        {q: "Q42. निम्नलिखित में से कौन-सी भाषा भारतीय संविधान की 22 आधिकारिक भाषाओं में तो शामिल है, लेकिन वह किसी भी राज्य की मुख्य राजभाषा नहीं है और न ही वह शास्त्रीय भाषा है?", o: ["(A) सिंधी", "(B) बंगाली", "(C) मराठी", "(D) तमिल"], a: 0, e: "* सही उत्तर: (A) * व्याख्या: सिंधी भाषा किसी एक विशेष राज्य की सीमा में नहीं बंधी है, बल्कि यह देश के विभिन्न हिस्सों में फैले सिंधी समुदाय द्वारा बोली जाती है। इसे 1967 में जोड़ा गया था।"},
        {q: "Q43. पश्चिम बंगाल और त्रिपुरा में मुख्य रूप से बोली जाने वाली 'बंगाली' भाषा को किस वर्ष शास्त्रीय भाषा का दर्जा मिला?", o: ["(A) 2013", "(B) 2014", "(C) 2024", "(D) 2026"], a: 2, e: "* सही उत्तर: (C) * व्याख्या: बंगाली भाषा को अक्टूबर 2024 में केंद्रीय मंत्रिमंडल द्वारा भारत की शास्त्रीय भाषा के रूप में अधिसूचित किया गया था।"},
        {q: "Q44. महाराष्ट्र की आधिकारिक भाषा 'मराठी' को शास्त्रीय भाषा का दर्जा कब मिला?", o: ["(A) 2004", "(B) 2008", "(C) 2014", "(D) 2024"], a: 3, e: "* सही उत्तर: (D) * व्याख्या: महाराष्ट्र सरकार और वहां के साहित्यकारों की लंबे समय से चल रही मांग को पूरा करते हुए केंद्र सरकार ने अक्टूबर 2024 में मराठी को शास्त्रीय भाषा घोषित किया।"},
        {q: "Q45. संथाली भाषा मुख्य रूप से भारत के किस जनजातीय क्षेत्र या राज्य में बोली जाती है, जिसे 92वें संशोधन द्वारा शामिल किया गया था?", o: ["(A) गुजरात", "(B) झारखंड और उड़ीसा", "(C) केरल", "(D) असम"], a: 1, e: "* सही उत्तर: (B) * व्याख्या: संथाली संथाल जनजाति द्वारा मुख्य रूप से झारखंड, ओडिशा, और पश्चिम बंगाल के क्षेत्रों में बोली जाती है। इसे 2003 में 92वें संशोधन द्वारा जोड़ा गया था।"},
        {q: "Q46. यदि भारतीय संघ में एक नए राज्य का सृजन करना हो, तो संविधान की किस अनुसूची में संशोधन करना अनिवार्य होता है?", o: ["(A) पहली अनुसूची", "(B) दूसरी अनुसूची", "(C) तीसरी अनुसूची", "(D) पांचवीं अनुसूची"], a: 0, e: "* सही उत्तर: (A) * व्याख्या: पहली अनुसूची में भारत के सभी राज्यों और केंद्र शासित प्रदेशों के नाम और उनके क्षेत्रीय अधिकार क्षेत्रों की सूची होती है। अतः नया राज्य बनने पर इसी में बदलाव होता है।"},
        {q: "Q47. 'बोडो' भाषा मुख्य रूप से भारत के किस उत्तर-पूर्वी राज्य में बोली जाती है, जिसे 8वीं अनुसूची में शामिल किया गया है?", o: ["(A) मणिपुर", "(B) मेघालय", "(C) असम", "(D) मिजोरम"], a: 2, e: "* सही उत्तर: (C) * व्याख्या: बोडो भाषा मुख्य रूप से असम के बोडोलैंड क्षेत्रीय क्षेत्र में बोली जाने वाली भाषा है, जिसे 2003 के 92वें संविधान संशोधन द्वारा जोड़ा गया था।"},
        {q: "Q48. संविधान की ग्यारहवीं अनुसूची के तहत मिलने वाले '29 विषयों' पर नियम या कानून बनाने का अंतिम अधिकार किसे प्राप्त है?", o: ["(A) संसद को", "(B) राज्य विधानमंडल को", "(C) जिला कलेक्टर को", "(D) राज्यपाल को"], a: 1, e: "* सही उत्तर: (B) * व्याख्या: संविधान ने यह राज्यों पर छोड़ा है कि वे इन 29 विषयों में से कितनी शक्तियां अपनी पंचायतों को सौंपना चाहते हैं, इसलिए राज्य विधानमंडल ही इस पर अंतिम कानून बनाता है।"},
        {q: "Q49. 'विधि का शासन' और 'मजबूत केंद्र के साथ संघीय व्यवस्था' क्रमशः किन दो देशों के संविधान से भारतीय संविधान में शामिल किए गए हैं?", o: ["(A) अमेरिका और कनाडा", "(B) ब्रिटेन और कनाडा", "(C) ब्रिटेन और ऑस्ट्रेलिया", "(D) कनाडा और फ्रांस"], a: 1, e: "* सही उत्तर: (B) * व्याख्या: 'विधि का शासन' (Rule of Law) ब्रिटेन से लिया गया है और 'मजबूत केंद्र वाली संघीय व्यवस्था' (Federal System with Strong Centre) कनाडा से ली गई है।"},
        {q: "Q50. वर्तमान में (2024-2026 के आंकड़ों के अनुसार) भारत की 11 शास्त्रीय भाषाओं में से सबसे नवीन जोड़ी गई भाषाओं का समूह कौन-सा है?", o: ["(A) तमिल, संस्कृत, ओड़िया", "(B) कन्नड़, तेलुगू, मलयालम", "(C) मराठी, पालि, प्राकृत, असमिया, बंगाली", "(D) कोंकणी, मणिपुरी, नेपाली"], a: 2, e: "* सही उत्तर: (C) * व्याख्या: अक्टूबर 2024 में एक साथ जोड़ी गई ये 5 भाषाएँ (मराठी, पालि, प्राकृत, असमिया, बंगाली) सबसे नवीनतम शास्त्रीय भाषाएँ हैं, जिससे इनकी कुल संख्या 11 हो गई है。"}
    ];
const startTime = Date.now();
let currentQ = 0, score = 0; // score can be fractional due to -1/3 marking
let currentStreak=0,maxStreak=0;
let answered = new Array(data.length).fill(false);
function showQ() {
document.getElementById('q-text').innerText = data[currentQ].q;
const tagBox=document.getElementById('exam-tag');
if(data[currentQ].tag){tagBox.innerText=data[currentQ].tag;tagBox.style.display='block';}else{tagBox.innerText='';tagBox.style.display='none';}
let oBox = document.getElementById('options');
oBox.innerHTML = "";
document.getElementById('feedback').style.display = "none";
data[currentQ].o.forEach((opt, idx) => {
let btn = document.createElement("button");
btn.innerText = opt;
btn.onclick = () => {
let btns = oBox.getElementsByTagName("button");
for(let b of btns) b.disabled = true;
if(idx === data[currentQ].a) {
btn.style.borderColor = "#388e3c";
btn.style.background = "#e8f5e9";
if(!answered[currentQ]) score += 1;
} else {
btn.style.borderColor = "#d32f2f";
btn.style.background = "#ffebee";
btns[data[currentQ].a].style.borderColor = "#388e3c";
btns[data[currentQ].a].style.background = "#e8f5e9";
if(!answered[currentQ]) score -= (1/3);
}
if(idx === data[currentQ].a){
currentStreak++;
if(currentStreak>maxStreak) maxStreak=currentStreak;
let msg="";
if(currentStreak===3) msg="🔥 3 Correct Streak!";
else if(currentStreak===5) msg="🚀 5 Correct Streak!";
else if(currentStreak===10) msg="👑 10 Correct Streak!";
else if(currentStreak===15) msg="💯 15 Correct Streak!";
else if(currentStreak===20) msg="⚡ 20 Correct Streak!";
if(msg){
celebrate(
msg,
currentStreak===3?'Keep Going!':
currentStreak===5?'Awesome!':
currentStreak===10?'Legend!':
currentStreak===15?'Unstoppable!':
'Ultimate Master!'
);
}
}else{
currentStreak=0;
}
answered[currentQ] = true;
document.getElementById('feedback').innerHTML = "<b>व्याख्या:</b> " + data[currentQ].e;
document.getElementById('feedback').style.display = "block";
};
oBox.appendChild(btn);
});
}


function celebrate(msg,sub){
 const p=document.getElementById('streakPopup');
 document.getElementById('streakTitle').innerText=msg;
 document.getElementById('streakSub').innerText=sub;
 p.classList.add('show');
 for(let i=0;i<28;i++){
   const b=document.createElement('div');
   b.className='burst';
   const r=document.getElementById('streakCard').getBoundingClientRect();
   b.style.left=(r.left+r.width/2)+'px';
   b.style.top=(r.top+r.height/2)+'px';
   b.style.setProperty('--x',(Math.random()*220-110)+'px');
   b.style.setProperty('--y',(Math.random()*140-70)+'px');
   p.appendChild(b);
   setTimeout(()=>b.remove(),1600);
 }
 setTimeout(()=>p.classList.remove('show'),2400);
}
function showScore(){
document.getElementById('quiz-box').style.display='none';
document.getElementById('controls').style.display='none';
let attempted=answered.filter(v=>v).length;
let correct=0;
for(let i=0;i<data.length;i++){
  if(answered[i]){
    // recompute from score impossible, inspect disabled state not available, so use score formula below
  }
}
let finalScore=score;
let wrong=Math.round((attempted-finalScore)*3/4);
correct=attempted-wrong;
let unattempted=data.length-attempted;
let accuracy=attempted?((correct/attempted)*100).toFixed(2):"0.00";
document.getElementById('score').innerText=finalScore.toFixed(2);
document.getElementById('total').innerText=data.length;
document.getElementById('correct').innerText=correct;
document.getElementById('wrong').innerText=wrong;
document.getElementById('attempted').innerText=attempted;
document.getElementById('unattempted').innerText=unattempted;
document.getElementById('accuracy').innerText=accuracy;
const endTime=Date.now();
const totalSeconds=Math.floor((endTime-startTime)/1000);
const minutes=Math.floor(totalSeconds/60);
const seconds=totalSeconds%60;
document.getElementById('timeTaken').innerText=
`${String(minutes).padStart(2,'0')}:${String(seconds).padStart(2,'0')}`;
document.getElementById('highestStreak').innerText=maxStreak;
const overallPercent=(Math.max(0,finalScore)/data.length)*100;
let badge='NEEDS PRACTICE',bg='#c62828';
if(overallPercent>=90){badge='EXCELLENT';bg='#2e7d32';}
else if(overallPercent>=75){badge='VERY GOOD';bg='#1565c0';}
else if(overallPercent>=60){badge='GOOD';bg='#ef6c00';}
else if(overallPercent>=40){badge='AVERAGE';bg='#8d6e63';}
const pb=document.getElementById('perfBadge');
pb.innerText=badge;pb.style.background=bg;
document.getElementById('score-card').style.display='block';
}
function nextQ() { if(currentQ < data.length - 1) { currentQ++; showQ(); } }
function prevQ() { if(currentQ > 0) { currentQ--; showQ(); } }
function confirmSubmit(){ if(confirm('क्या आप टेस्ट सबमिट करना चाहते हैं?')) showScore(); }
showQ();
</script>
