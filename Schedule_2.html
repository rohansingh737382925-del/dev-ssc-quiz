<style>
body { font-family: sans-serif; background-color: #f4f7f6; margin: 0; padding: 10px; display: flex; justify-content: center; }
.container { width: 100%; max-width: 500px; background: #fff; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
h2 { text-align: center; color: #d32f2f; font-size: 1.2rem; margin-bottom: 15px; }
.question { font-weight: bold; margin-bottom: 15px; font-size: 1.05rem; line-height: 1.4; color: #333; }
.options button { display: block; width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 8px; background: #fff; cursor: pointer; text-align: left; font-size: 0.95rem; }
#feedback { margin-top: 15px; padding: 12px; background: #e3f2fd; border-left: 5px solid #1976d2; display: none; font-size: 0.9rem; line-height: 1.4; color: #444; }
.controls { display: flex; justify-content: space-between; margin-top: 20px; }
.nav-btn { padding: 10px 15px; border: none; border-radius: 5px; background: #1976d2; color: white; font-weight: bold; cursor: pointer; }

</div>

<script>
const data = [
{q: "Q51. भारतीय संविधान की पहली अनुसूची का संबंध निम्नलिखित में से किससे है?", o: ["(A) संघ और राज्यों के क्षेत्र, नाम और उनकी सीमाएँ", "(B) संवैधानिक पदाधिकारियों की शपथ का प्रारूप", "(C) राज्यसभा की सीटों का राज्यों में आवंटन", "(D) आधिकारिक क्षेत्रीय भाषाएँ"], a: 0, e: "सही उत्तर: (A) व्याख्या: पहली अनुसूची में भारत के सभी राज्यों और केंद्र शासित प्रदेशों के नाम और उनके भौगोलिक/क्षेत्रीय विस्तार की सूची दी गई है।"},
{q: "Q52. भारतीय संविधान की किस अनुसूची में विभिन्न संवैधानिक पदाधिकारियों जैसे राष्ट्रपति, सर्वोच्च न्यायालय के न्यायाधीश और कैग (CAG) के वेतन और भत्तों का विवरण है?", o: ["(A) पहली अनुसूची", "(B) दूसरी अनुसूची", "(C) तीसरी अनुसूची", "(D) चौथी अनुसूची"], a: 1, e: "सही उत्तर: (B) व्याख्या: दूसरी अनुसूची भारत के उच्च पदाधिकारियों के वेतन, भत्तों (Emoluments) और विशेषाधिकारों को तय करती है।"},
{q: "Q53. भारत के संघ के मंत्रियों, सांसदों और सर्वोच्च न्यायालय के न्यायाधीशों द्वारा ली जाने वाली शपथ (Oath) का प्रारूप किस अनुसूची में वर्णित है?", o: ["(A) दूसरी अनुसूची", "(B) तीसरी अनुसूची", "(C) चौथी अनुसूची", "(D) पांचवीं अनुसूची"], a: 1, e: "सही उत्तर: (B) व्याख्या: तीसरी अनुसूची में मंत्रियों, सांसदों, विधायकों और न्यायाधीशों की पद की शपथ का प्रारूप दिया गया है।"},
{q: "Q54. निम्नलिखित में से किस पदाधिकारी की शपथ का प्रारूप संविधान की तीसरी अनुसूची में शामिल नहीं है?", o: ["(A) भारत के नियंत्रक-महालेखापरीक्षक (CAG)", "(B) सर्वोच्च न्यायालय के न्यायाधीश", "(C) भारत के राष्ट्रपति", "(D) संसद के सदस्य"], a: 2, e: "सही उत्तर: (C) व्याख्या: यह परीक्षाओं का सबसे प्रसिद्ध अपवाद है। भारत के राष्ट्रपति की शपथ का प्रारूप तीसरी अनुसूची में नहीं है, बल्कि इसके लिए संविधान में अलग से अनुच्छेद 60 दिया गया है। (इसी तरह उपराष्ट्रपति के लिए अनुच्छेद 69 और राज्यपाल के लिए अनुच्छेद 159 है)।"},
{q: "Q55. भारतीय संविधान की चौथी अनुसूची निम्नलिखित में से किस विषय से संबंधित है?", o: ["(A) दल-बदल विरोधी कानून", "(B) राज्यसभा में विभिन्न राज्यों और केंद्र शासित प्रदेशों के लिए सीटों का आवंटन", "(C) संघ, राज्य और समवर्ती सूचियाँ", "(D) पंचायती राज के अधिकार"], a: 1, e: "सही उत्तर: (B) व्याख्या: चौथी अनुसूची यह तय करती है कि देश के प्रत्येक राज्य और केंद्र शासित प्रदेश को जनसंख्या के आधार पर उच्च सदन (राज्यसभा) में कितनी सीटें मिलेंगी।"},
{q: "Q56. संविधान की पांचवीं अनुसूची का मुख्य संबंध किसके प्रशासन और नियंत्रण से है?", o: ["(A) केवल उत्तर-पूर्वी राज्यों का प्रशासन", "(B) भाषाई अल्पसंख्यकों का संरक्षण", "(C) अनुसूचित क्षेत्रों और अनुसूचित जनजातियों (ST) का प्रशासन", "(D) केंद्र-राज्य वित्तीय संबंध"], a: 2, e: "सही उत्तर: (C) व्याख्या: पांचवीं अनुसूची भारत के विभिन्न राज्यों (चार पूर्वोत्तर राज्यों को छोड़कर) में फैले अनुसूचित क्षेत्रों और जनजातियों के प्रशासन और नियंत्रण के लिए विशेष प्रावधान करती है।"},
{q: "Q57. भारतीय संविधान की छठी अनुसूची निम्नलिखित में से किन चार उत्तर-पूर्वी राज्यों के जनजातीय क्षेत्रों के प्रशासन से संबंधित है?", o: ["(A) असम, मेघालय, त्रिपुरा, मणिपुर", "(B) असम, मेघालय, त्रिपुरा, मिजोरम", "(C) अरुणाचल प्रदेश, नागालैंड, मणिपुर, मिजोरम", "(D) असम, नागालैंड, मणिपुर, त्रिपुरा"], a: 1, e: "सही उत्तर: (B) व्याख्या: छठी अनुसूची असम, मेघालय, त्रिपुरा और मिजोरम (ट्रिक: ATM without Money) के जनजातीय क्षेत्रों के लिए स्वायत्त जिला परिषदों (ADCs) के गठन का अधिकार देती है। इसमें मणिपुर शामिल नहीं है।"},
{q: "Q58. शक्तियों का विभाजन (संघ सूची, राज्य सूची और समवर्ती सूची) संविधान की किस अनुसूची के अंतर्गत आता है?", o: ["(A) छठी अनुसूची", "(B) सातवीं अनुसूची", "(C) आठवीं अनुसूची", "(D) नौवीं अनुसूची"], a: 1, e: "सही उत्तर: (B) व्याख्या: सातवीं अनुसूची केंद्र और राज्यों के बीच विधायी शक्तियों के स्पष्ट बंटवारे के लिए तीन अलग-अलग सूचियों (Union, State and Concurrent Lists) का प्रावधान करती है।"},
{q: "Q59. मूल संविधान में सातवीं अनुसूची की 'संघ सूची' (Union List) में कुल कितने विषय थे और वर्तमान में कितने हैं?", o: ["(A) मूल रूप से 97, वर्तमान में 100", "(B) मूल रूप से 66, वर्तमान में 61", "(C) मूल रूप से 47, वर्तमान में 52", "(D) मूल रूप से 100, वर्तमान में 97"], a: 0, e: "सही उत्तर: (A) व्याख्या: संघ सूची पर कानून बनाने का अधिकार केवल संसद को है। इसमें रक्षा, रेलवे, banking जैसे राष्ट्रीय महत्व के विषय शामिल हैं, जिनकी संख्या मूल रूप से 97 थी जो अब बढ़कर 100 हो चुकी है।"},
{q: "Q60. मूल संविधान की 'राज्य सूची' (State List) में कुल 66 विषय थे। वर्तमान में संशोधनों के बाद इनकी संख्या घटकर कितनी रह गई है?", o: ["(A) 100 विषय", "(B) 61 विषय", "(C) 52 विषय", "(D) 50 विषय"], a: 1, e: "सही उत्तर: (B) व्याख्या: राज्य सूची पर सामान्य परिस्थितियों में राज्य सरकारें कानून बनाती हैं। इसके 5 विषयों को हटा दिए जाने के बाद अब वर्तमान में इसमें केवल 61 विषय ही शेष बचे हैं।"},
{q: "Q61. सातवीं अनुसूची की 'समवर्ती सूची' (Concurrent List) में मूल रूप से 47 विषय थे, वर्तमान में इसमें कुल कितने विषय शामिल हैं?", o: ["(A) 50 विषय", "(B) 52 विषय", "(C) 61 विषय", "(D) 97 विषय"], a: 1, e: "सही उत्तर: (B) व्याख्या: समवर्ती सूची पर केंद्र और राज्य दोनों कानून बना सकते हैं, लेकिन विवाद की स्थिति में केंद्र का कानून मान्य होता है। वर्तमान में इसमें 52 विषय हैं।"},
{q: "Q62. किस प्रसिद्ध संविधान संशोधन अधिनियम द्वारा 1976 में राज्य सूची से 5 विषयों (शिक्षा, वन, नाप-तौल, वन्यजीव संरक्षण और न्याय प्रशासन) को हटाकर समवर्ती सूची में स्थानांतरित किया गया था?", o: ["(A) 24वां संविधान संशोधन", "(B) 42वां संविधान संशोधन", "(C) 44वां संविधान संशोधन", "(D) 86वां संविधान संशोधन"], a: 1, e: "सही उत्तर: (B) व्याख्या: 42वें संविधान संशोधन (1976), जिसे 'लघु संविधान' भी कहा जाता है, के तहत शिक्षा और वन जैसे 5 महत्वपूर्ण विषयों को राज्य सूची से निकालकर समवर्ती सूची (Concurrent List) में डाल दिया गया था ताकि केंद्र भी इस पर कानून बना सके।"},
{q: "🗣️ भाग 2: आठवीं अनुसूची और आधिकारिक राजभाषा के अनुच्छेदों के PYQs\n\nQ63. भारतीय संविधान के किस भाग (Part) में राजभाषा और आधिकारिक भाषाओं से संबंधित विस्तृत उपबंध दिए गए हैं?", o: ["(A) भाग 15", "(B) भाग 16", "(C) भाग 17", "(D) भाग 18"], a: 2, e: "सही उत्तर: (C) व्याख्या: संविधान का भाग 17 (Part XVII) राजभाषा से संबंधित है, जो अनुच्छेद 343 से लेकर अनुच्छेद 351 तक विस्तृत है।"},
{q: "Q64. भारतीय संविधान का कौन-सा अनुच्छेद यह स्पष्ट करता है कि संघ की राजभाषा 'हिंदी' और लिपि 'देवनागरी' होगी?", o: ["(A) अनुच्छेद 343", "(B) अनुच्छेद 344", "(C) अनुच्छेद 345", "(D) अनुच्छेद 348"], a: 0, e: "सही उत्तर: (A) व्याख्या: अनुच्छेद 343(1) के तहत यह स्पष्ट घोषित किया गया है कि भारत संघ की राजभाषा हिंदी और उसकी आधिकारिक लिपि देवनागरी होगी।"},
{q: "Q65.恢复 भारत के प्रत्येक राज्य की अपनी एक या अधिक आधिकारिक भाषाएँ चुनने का अधिकार (राज्य की राजभाषा) संविधान के किस अनुच्छेद के तहत दिया गया है?", o: ["(A) अनुच्छेद 343", "(B) अनुच्छेद 345", "(C) अनुच्छेद 346", "(D) अनुच्छेद 351"], a: 1, e: "सही उत्तर: (B) व्याख्या: अनुच्छेद 345 के तहत राज्यों के विधानमंडलों को यह शक्ति दी गई है कि वे अपने राज्य के प्रशासनिक कार्यों के लिए उस राज्य में बोली जाने वाली किसी भी भाषा या हिंदी को आधिकारिक भाषा के रूप में अपना सकते हैं।"},
{q: "Q66. भारतीय संविधान के किस अनुच्छेद के अंतर्गत यह अनिवार्य किया गया है कि उच्चतम न्यायालय (Supreme Court) और उच्च न्यायालयों (High Courts) की सभी कार्यवाहियां और कानून केवल अंग्रेजी भाषा में ही होंगे?", o: ["(A) अनुच्छेद 343", "(B) अनुच्छेद 345", "(C) अनुच्छेद 348", "(D) अनुच्छेद 350"], a: 2, e: "सही उत्तर: (C) व्याख्या: अनुच्छेद 348 स्पष्ट करता है कि जब तक संसद कानून बनाकर कोई अन्य व्यवस्था न करे, तब तक सुप्रीम कोर्ट और हाई कोर्ट की सभी कार्यवाहियां, विधेयक, अधिनियम और आदेश केवल अंग्रेजी भाषा में ही जारी किए जाएंगे।"},
{q: "Q67. संविधान का कौन-सा अनुच्छेद केंद्र सरकार को हिंदी भाषा के विकास, प्रसार और उसके संवर्धन के लिए विशेष निर्देश (Directives) देता है?", o: ["(A) अनुच्छेद 343", "(B) अनुच्छेद 344", "(C) अनुच्छेद 350A", "(D) अनुच्छेद 351"], a: 3, e: "सही उत्तर: (D) व्याख्या: अनुच्छेद 351 के तहत यह संघ (केंद्र सरकार) का कर्तव्य निर्धारित किया गया है कि वह हिंदी भाषा के प्रसार को बढ़ावा दे और उसका विकास करे ताकि वह भारत की मिश्रित संस्कृति की अभिव्यक्ति का माध्यम बन सके।"},
{q: "Q68. प्राथमिक स्तर पर मातृभाषा में शिक्षा (Instruction in Mother-Tongue) प्रदान करने की सुविधाएं सुनिश्चित करने का प्रावधान किस अनुच्छेद में जोड़ा गया है?", o: ["(A) अनुच्छेद 345", "(B) अनुच्छेद 350A", "(C) अनुच्छेद 350B", "(D) अनुच्छेद 351"], a: 1, e: "सही उत्तर: (B) व्याख्या: 7वें संविधान संशोधन 1956 द्वारा अनुच्छेद 350A जोड़ा गया, जो राज्यों को यह निर्देश देता है कि वे भाषाई अल्पसंख्यक वर्गों के बच्चों को प्राथमिक शिक्षा उनकी मातृभाषा में देने का प्रयास करें।"},
{q: "Q69. भाषाई अल्पसंख्यकों के लिए एक 'विशेष अधिकारी' (Special Officer for Linguistic Minorities) की नियुक्ति का प्रावधान संविधान के किस अनुच्छेद में है?", o: ["(A) अनुच्छेद 344", "(B) अनुच्छेद 348", "(C) अनुच्छेद 350B", "(D) अनुच्छेद 351"], a: 2, e: "सही उत्तर: (C) व्याख्या: अनुच्छेद 350B के तहत राष्ट्रपति द्वारा भाषाई अल्पसंख्यकों के हितों की रक्षा के लिए एक विशेष आयुक्त/अधिकारी नियुक्त किया जाता है, जिसे 7वें संशोधन द्वारा संविधान में जोड़ा गया था।"},
{q: "Q70. निम्नलिखित में से कौन-सी विदेशी भाषा भारतीय संविधान की आठवीं अनुसूची में शामिल एक मान्यता प्राप्त आधिकारिक भाषा है?", o: ["(A) अंग्रेजी", "(B) नेपाली", "(C) भूटानी", "(D) तिब्बती"], a: 1, e: "सही उत्तर: (B) व्याख्या: नेपाली भाषा विदेशी मूल की होने के बावजूद भारत के कई हिस्सों (जैसे सिक्किम) में बोली जाती है, इसलिए इसे 1992 में आठवीं अनुसूची में शामिल किया गया था। ध्यान रहे, अंग्रेजी भारत की राजकाज की भाषा जरूर है, लेकिन वह आठवीं अनुसूची की 22 आधिकारिक भाषाओं में शामिल नहीं है।"},
{q: "Q71. भारत के किस उत्तर-पूर्वी राज्य की आधिकारिक राजभाषा 'अंग्रेजी' है, जबकि वह भाषा संविधान की आठवीं अनुसूची में दर्ज नहीं है?", o: ["(A) असम", "(B) नागालैंड", "(C) त्रिपुरा", "(D) मणिपुर"], a: 1, e: "सही उत्तर: (B) व्याख्या: नागालैंड (और मेघालय भी) की आधिकारिक राज्य भाषा अंग्रेजी है, जबकि अंग्रेजी भाषा संविधान की आठवीं अनुसूची की 22 आधिकारिक भाषाओं की सूची का हिस्सा नहीं है।"},
{q: "Q72. 'डोगरी' और 'मैथिली' भाषाओं को किस वर्ष संविधान में शामिल किया गया, जिससे आधिकारिक भाषाओं की संख्या बढ़कर 22 हो गई थी?", o: ["(A) 1967", "(B) 1992", "(C) 2003", "(D) 2011"], a: 2, e: "सही उत्तर: (C) व्याख्या: डोगरी, मैथिली, बोडो और संथाली को वर्ष 2003 में 92वें संविधान संशोधन द्वारा जोड़ा गया था।"},
{q: "📜 भाग 3: शास्त्रीय भाषा (Classical Languages) के मापदंडों और शर्तों के PYQs\n\nQ73. भारत सरकार के संस्कृति मंत्रालय (Ministry of Culture) के नियमों के अनुसार, किसी भाषा को 'शास्त्रीय भाषा' का दर्जा देने के लिए उसके दर्ज ग्रंथों/साहित्य का इतिहास न्यूनतम कितने वर्ष पुराना होना चाहिए?", o: ["(A) 500 से 1000 वर्ष", "(B) 1000 से 1200 वर्ष", "(C) 1500 से 2000 वर्ष", "(D) 3000 वर्ष से अधिक"], a: 2, e: "सही उत्तर: (C) व्याख्या: किसी भी भाषा को शास्त्रीय भाषा (Classical Language) घोषित करने की पहली और सबसे महत्वपूर्ण शर्त यह है कि उसके प्रारंभिक ग्रंथों या लिखित इतिहास की अवधि कम से कम 1500 से 2000 वर्ष पुरानी होनी चाहिए।"},
{q: "Q74. शास्त्रीय भाषा का दर्जा प्राप्त करने के लिए भाषा के साहित्यों के संबंध में कौन-सी शर्त अनिवार्य है?", o: ["(A) उसका साहित्य किसी विदेशी भाषा से अनूदित होना चाहिए", "(B) उसके पास प्राचीन साहित्यों/ग्रंथों का एक मूल्यवान संग्रह होना चाहिए, जिसे बोलने वालों की पीढ़ियों द्वारा मौलिक माना गया हो", "(C) वह भाषा केवल देश के बाहर बोली जाती हो", "(D) उसकी अपनी कोई स्वतंत्र लिपि न हो"], a: 1, e: "सही उत्तर: (B) व्याख्या: सरकार के नियमों के अनुसार, उस भाषा का प्राचीन साहित्य बिल्कुल मौलिक (Original) होना चाहिए, यानी वह किसी अन्य भाषाई समुदाय या इतिहास से उधार लिया हुआ या नकल किया हुआ नहीं होना चाहिए।"},
{q: "Q75. शास्त्रीय भाषाओं के संदर्भ में, इसके 'प्राचीन रूप' और इसके 'आधुनिक रूप' के बीच के संबंध को लेकर क्या नियम तय किया गया है?", o: ["(A) प्राचीन और आधुनिक रूप का बिल्कुल एक जैसा होना अनिवार्य है", "(B) शास्त्रीय भाषा और उसके बाद के आधुनिक रूप या उसकी शाखाओं के बीच एक अंतर (Discontinuity) हो सकता है", "(C) आधुनिक रूप का पूरी तरह विलुप्त होना जरूरी है", "(D) प्राचीन रूप का कोई लिखित साक्ष्य उपलब्ध नहीं होना चाहिए"], a: 1, e: "सही उत्तर: (B) व्याख्या: शास्त्रीय भाषा का मूल प्राचीन साहित्य और उसका आधुनिक रूप एक-दूसरे से भिन्न हो सकते हैं। उनके बीच एक समय अंतराल या अलगाव (Discontinuity) हो सकता है, जैसे पुरानी संस्कृत और आज की हिंदी/अन्य बोलियों के बीच का अंतर।"},
{q: "Q76. किसी भाषा को 'शास्त्रीय भाषा' का दर्जा मिल जाने के बाद, मानव संसाधन विकास मंत्रालय (अब शिक्षा मंत्रालय) द्वारा उसे बढ़ावा देने के लिए क्या विशेष लाभ दिया जाता है?", o: ["(A) उस भाषा को देश की एकमात्र राष्ट्रभाषा घोषित कर दिया जाता है", "(B) उस भाषा के अध्ययन के लिए देश के केंद्रीय विश्वविद्यालयों में 'सेंटर ऑफ एक्सीलेंस' और विशिष्ट पीठ (Chairs) की स्थापना की जाती है", "(C) अन्य सभी भाषाओं पर प्रतिबंध लगा दिया जाता है", "(D) उस भाषा को बोलने वालों को सीधे सरकारी नौकरी दी जाती है"], a: 1, e: "सही उत्तर: (B) व्याख्या: शास्त्रीय भाषा का दर्जा मिलने के बाद सरकार उस भाषा के उत्थान, शोध और प्राचीन ग्रंथों के अनुवाद के लिए भारी वित्तीय सहायता देती है और विश्वविद्यालयों में प्रोफेसरों के लिए विशेष अंतरराष्ट्रीय पुरस्कार और शोध पीठों का गठन करती है।"},
{q: "Q77. निम्नलिखित दक्षिण भारतीय भाषाओं में से कौन-सी भाषा वर्ष 2013 में भारत की पांचवीं शास्त्रीय भाषा बनी थी?", o: ["(A) तमिल", "(B) कन्नड़", "(C) तेलुगू", "(D) मलयालम"], a: 3, e: "सही उत्तर: (D) व्याख्या: केरल की राजभाषा 'मलयालम' को वर्ष 2013 में भारत सरकार द्वारा शास्त्रीय भाषा (Classical Language) के रूप में मान्यता दी गई थी।"},
{q: "Q78. ओड़िया (Odia) भाषा को किस वर्ष भारत की शास्त्रीय भाषा की सूची में जोड़ा गया था, जो कि वर्ष 2024 के नए संशोधनों से पहले की आखिरी भाषा थी?", o: ["(A) 2005", "(B) 2008", "(C) 2014", "(D) 2020"], a: 2, e: "सही उत्तर: (C) व्याख्या: ओड़िया भाषा को वर्ष 2014 में भारत की छठवीं शास्त्रीय भाषा के रूप में शामिल किया गया था। इसके बाद सीधे अक्टूबर 2024 में बड़ा बदलाव हुआ।"},
{q: "Q79. अक्टूबर 2024 में जिन 5 नई भाषाओं को शास्त्रीय भाषा का दर्जा दिया गया, उनमें से कौन-सी भाषा प्राचीन जैन साहित्यों की प्रमुख भाषा रही है?", o: ["(A) पालि", "(B) प्राकृत", "(C) अपभ्रंश", "(D) मराठी"], a: 1, e: "सही उत्तर: (B) व्याख्या: 'प्राकृत' भाषा का प्राचीन जैन ग्रंथों, शिलालेखों (जैसे सम्राट अशोक के कई शिलालेख) में भारी उपयोग हुआ है। इसे अक्टूबर 2024 में सरकार द्वारा शास्त्रीय भाषा का दर्जा देकर सम्मानित किया गया।"},
{q: "Q80. प्राचीन बौद्ध त्रिपिटक ग्रंथों (जैसे सुत्तपिटक, विनयपिटक) की मूल भाषा 'पालि' को किस वर्ष भारत की आधिकारिक शास्त्रीय भाषाओं के समूह में शामिल किया गया?", o: ["(A) 2004", "(B) 2014", "(C) 2024", "(D) 2026"], a: 2, e: "सही उत्तर: (C) व्याख्या: पालि भाषा को इसके ऐतिहासिक और आध्यात्मिक महत्व के कारण अक्टूबर 2024 में केंद्रीय कैबिनेट द्वारा शास्त्रीय भाषा का दर्जा दिया गया था।"},
{q: "✍️ भाग 4: अन्य अनुसूचियों और विशिष्ट संशोधनों के PYQs\n\nQ81. भारतीय संविधान की किस अनुसूची के तहत असम, मेघालय, त्रिपुरा और मिजोरम के अलावा अन्य राज्यों के 'अनुसूचित क्षेत्रों के प्रशासन के लिए एक जनजातीय सलाहकार परिषद (Tribal Advisory Council)' के गठन का प्रावधान है?", o: ["(A) चौथी अनुसूची", "(B) पांचवीं अनुसूची", "(C) छठी अनुसूची", "(D) सातवीं अनुसूची"], a: 1, e: "सही उत्तर: (B) व्याख्या: पांचवीं अनुसूची के तहत अनुसूचित जनजातियों के कल्याण और उन्नति के लिए राज्यों में जनजातीय सलाहकार परिषदों की स्थापना का विशेष अधिकार राज्यपाल और राष्ट्रपति को दिया गया है।"},
{q: "Q82. संविधान की छठी अनुसूची के तहत उत्तर-पूर्वी राज्यों में गठित 'स्वायत्त जिला परिषदों (Autonomous District Councils - ADCs)' के पास निम्नलिखित में से कौन-सा अधिकार होता है?", o: ["(A) अपनी अलग सेना रखने का अधिकार", "(B) भूमि, जंगलों, नहरों के पानी और विवाह जैसे स्थानीय मामलों पर कानून बनाने और राजस्व एकत्र करने का अधिकार", "(C) अलग मुद्रा (Currency) जारी करने का अधिकार", "(D) देश के विदेशी मामलों को संभालने का अधिकार"], a: 1, e: "सही उत्तर: (B) व्याख्या: छठी अनुसूची की जिला परिषदों को अपने जनजातीय क्षेत्रों की संस्कृति और संपत्तियों के संरक्षण के लिए जमीन, जंगल, खेती, और सामाजिक रीति-रिवाजों पर सीधे कानून बनाने की बहुत बड़ी स्वायत्तता (प्रशासनिक और विधायी शक्ति) प्राप्त होती है।"},
{q: "Q83. निम्नलिखित में से कौन-सा विषय संविधान की सातवीं अनुसूची की 'समवर्ती सूची' (Concurrent List) के अंतर्गत आता है जिस पर केंद्र और राज्य दोनों कानून बना सकते हैं?", o: ["(A) रेलवे and बैंकिंग", "(B) पुलिस and सार्वजनिक स्वास्थ्य", "(C) विवाह, तलाक और शिक्षा", "(D) विदेशी मामले and रक्षा"], a: 2, e: "सही उत्तर: (C) व्याख्या: शिक्षा, विवाह, तलाक, वन और दिवालियापन जैसे विषय समवर्ती सूची का हिस्सा हैं। रेलवे और रक्षा संघ सूची में हैं, जबकि पुलिस और स्वास्थ्य राज्य सूची के विषय हैं।"},
{q: "Q84. भारतीय संविधान की 11वीं अनुसूची में शामिल 'कृषि, भूमि सुधार, लघु सिंचाई और गरीबी उन्मूलन' जैसे विषय कुल कितने क्षेत्रों में बांटे गए हैं?", o: ["(A) 18 विषय", "(B) 22 विषय", "(C) 29 विषय", "(D) 35 विषय"], a: 2, e: "सही उत्तर: (C) व्याख्या: 7उथवें संशोधन द्वारा पंचायतों को ग्रामीण विकास के लिए जिन 29 विषयों पर काम करने की जिम्मेदारी सौंपी गई है, उनमें कृषि, लघु सिंचाई और ग्रामीण विद्युतीकरण सबसे मुख्य हैं।"},
{q: "Q85. भारतीय संविधान की आखिरी यानी 12वीं अनुसूची को किस वर्ष संसद द्वारा पारित करके नगरपालिकाओं को वैधानिक मजबूती प्रदान की गई थी?", o: ["(A) 1951", "(B) 1985", "(C) 1992", "(D) 2011"], a: 2, e: "सही उत्तर: (C) व्याख्या: 12वीं अनुसूची को 74वें संविधान संशोधन अधिनियम, 1992 के माध्यम से संविधान का हिस्सा बनाया गया था, जो शहरी स्थानीय स्वशासन (Urban Local Bodies) को अधिकार देती है।"}
];
let score = 0;
let currentQ = 0;
let answered = new Array(data.length).fill(false);
function showQ(){
document.getElementById('feedback').style.display = "none";
if(currentQ >= data.length) return;
document.getElementById('q-text').innerText = data[currentQ].q;
let oBox = document.getElementById('options');
oBox.innerHTML = "";
data[currentQ].o.forEach((opt, idx) => {
let btn = document.createElement('button');
btn.innerText = opt;
btn.onclick = function(){
if(answered[currentQ]) return;
answered[currentQ] = true;
if(idx === data[currentQ].a){
score++;
btn.style.background = "#c8e6c9";
} else {
btn.style.background = "#ffcdd2";
oBox.children[data[currentQ].a].style.background = "#c8e6c9";
}
document.getElementById('feedback').innerHTML = "<b>व्याख्या:</b> " + data[currentQ].e;
document.getElementById('feedback').style.display = "block";
};
oBox.appendChild(btn);
});
document.getElementById('submit-btn').style.display = (currentQ === data.length - 1) ? "block" : "none";
}
function showScore(){
document.getElementById('quiz-box').style.display='none';
document.getElementById('controls').style.display='none';
let attempted=answered.filter(v=>v).length;
let wrong=attempted-score;
let unattempted=data.length-attempted;
let accuracy=attempted?((score/attempted)*100).toFixed(2):"0.00";
document.getElementById('score').innerText=score;
document.getElementById('correct').innerText=score;
document.getElementById('wrong').innerText=wrong;
document.getElementById('attempted').innerText=attempted;
document.getElementById('unattempted').innerText=unattempted;
document.getElementById('accuracy').innerText=accuracy;
document.getElementById('score-card').style.display='block';
}
function nextQ() { if(currentQ < data.length - 1) { currentQ++; function confirmSubmit(){ if(confirm('क्या आप टेस्ट सबमिट करना चाहते हैं?')) showScore(); }
showQ(); } }
function prevQ() { if(currentQ > 0) { currentQ--; function confirmSubmit(){ if(confirm('क्या आप टेस्ट सबमिट करना चाहते हैं?')) showScore(); }
showQ(); } }
function confirmSubmit(){ if(confirm('क्या आप टेस्ट सबमिट करना चाहते हैं?')) showScore(); }
showQ();
</script>
